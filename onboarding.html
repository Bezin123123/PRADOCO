<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding · Prado &amp; Co</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAFAF9; --card:#FFFFFF;
    --ink:#1A1D1C; --ink-2:#4E5755; --muted:#89928F; --muted-2:#B5BCBA;
    --line:#E9EDEC; --line-2:#D9DFDE;
    --teal:#0E9494; --teal-ink:#0A6B6B; --teal-soft:#E9F5F4; --teal-glow:rgba(14,148,148,.14);
    --amber:#B45309; --amber-soft:#FCF3E6; --amber-line:#F0D9B5;
    --green:#0E7A54; --green-soft:#E8F5EF; --green-line:#C3E3D4;
    --red:#B3261E; --red-soft:#FCEBEA;
    --shadow-sm:0 1px 2px rgba(26,29,28,.05);
    --shadow:0 1px 3px rgba(26,29,28,.06), 0 8px 24px -12px rgba(26,29,28,.10);
    --shadow-lg:0 2px 6px rgba(26,29,28,.06), 0 20px 48px -20px rgba(26,29,28,.16);
    --r:10px; --r-lg:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font:14px/1.55 "Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
  ::selection{background:var(--teal);color:#fff}
  button{font:inherit;cursor:pointer}
  input,textarea,select{font:inherit;color:var(--ink)}
  a{color:var(--teal-ink)}
  :focus-visible{outline:2px solid var(--teal);outline-offset:2px;border-radius:6px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .wrap{max-width:920px;margin:0 auto;padding:0 24px 96px}

  /* ---------- header ---------- */
  .top{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:22px 0 20px;border-bottom:1px solid var(--line);margin-bottom:28px}
  .brand{display:flex;align-items:center;gap:12px}
  .mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(150deg,#12A6A6,#0A6B6B);display:flex;align-items:center;justify-content:center;color:#fff;font:700 16px "Sora",sans-serif;box-shadow:var(--shadow-sm)}
  .brand h1{margin:0;font:600 15.5px/1 "Sora",sans-serif;letter-spacing:-.01em}
  .brand h1 span{color:var(--muted);font-weight:400;font-family:"Inter",sans-serif}
  .conn{display:flex;align-items:center;gap:7px;font:500 10.5px "JetBrains Mono",monospace;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);background:var(--card);border:1px solid var(--line);padding:7px 12px;border-radius:99px;box-shadow:var(--shadow-sm)}
  .conn .led{width:6px;height:6px;border-radius:50%;background:var(--muted-2)}
  .conn .led.on{background:var(--green)}
  .conn .led.err{background:var(--red)}

  /* ---------- buttons ---------- */
  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:var(--r);border:1px solid var(--line-2);background:var(--card);color:var(--ink);font-size:13px;font-weight:500;box-shadow:var(--shadow-sm);transition:border-color .14s, background .14s, transform .08s}
  .btn:hover{border-color:var(--muted-2);background:#FCFCFB}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--teal);border-color:var(--teal);color:#fff}
  .btn-primary:hover{background:var(--teal-ink);border-color:var(--teal-ink)}
  .btn-ghost{border-color:transparent;background:transparent;box-shadow:none;color:var(--ink-2)}
  .btn-ghost:hover{background:var(--teal-soft);color:var(--teal-ink);border-color:transparent}
  .btn:disabled{opacity:.55;cursor:default;transform:none}
  .btn-sm{padding:7px 12px;font-size:12.5px}

  /* ---------- home ---------- */
  .home-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:14px}
  .eyebrow{font:600 10.5px "JetBrains Mono",monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .rows{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);overflow:hidden;animation:fadeUp .35s ease both}
  .row{display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:18px;padding:16px 20px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s;text-align:left;width:100%;background:none;border-left:none;border-right:none;border-top:none}
  .row:last-child{border-bottom:none}
  .row:hover{background:#FBFDFC}
  .row .id{display:flex;flex-direction:column;gap:2px;min-width:0}
  .row .id .nm{font-size:14.5px;font-weight:600;letter-spacing:-.01em;color:var(--ink)}
  .row .id .mt{font:12px "JetBrains Mono",monospace;color:var(--muted)}
  .row .prog{display:flex;align-items:center;gap:9px;min-width:130px}
  .bar{flex:1;height:5px;background:var(--line);border-radius:99px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--teal);border-radius:99px;transition:width .4s}
  .pct{font:600 11px "JetBrains Mono",monospace;color:var(--teal-ink);min-width:32px;text-align:right}
  .pill{font:600 10.5px "JetBrains Mono",monospace;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border-radius:99px;border:1px solid var(--line-2);color:var(--ink-2);background:var(--paper)}
  .pill.f-onboarding{background:var(--teal-soft);border-color:#BFE3E1;color:var(--teal-ink)}
  .pill.f-producao{background:var(--amber-soft);border-color:var(--amber-line);color:var(--amber)}
  .pill.f-ativo{background:var(--green-soft);border-color:var(--green-line);color:var(--green)}
  .row .del{width:30px;height:30px;border-radius:8px;border:none;background:none;color:var(--muted-2);display:flex;align-items:center;justify-content:center;opacity:0;transition:.14s}
  .row:hover .del{opacity:1}
  .row .del:hover{background:var(--red-soft);color:var(--red)}
  .empty{background:var(--card);border:1px dashed var(--line-2);border-radius:var(--r-lg);padding:64px 24px;text-align:center;color:var(--muted)}
  .empty p{margin:0 0 18px;font-size:14px}
  .loading{padding:64px;text-align:center;color:var(--muted)}
  .spin{width:20px;height:20px;border:2px solid var(--line-2);border-top-color:var(--teal);border-radius:50%;display:inline-block;animation:sp .7s linear infinite;margin-bottom:10px}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ---------- editor: identity ---------- */
  .ed-top{display:flex;align-items:center;gap:12px;margin-bottom:20px;animation:fadeUp .3s ease both}
  .back{width:34px;height:34px;border-radius:9px;border:1px solid var(--line-2);background:var(--card);color:var(--ink-2);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);transition:.14s}
  .back:hover{color:var(--teal-ink);border-color:var(--teal)}
  .savemark{margin-left:auto;display:flex;align-items:center;gap:7px;font:500 11px "JetBrains Mono",monospace;color:var(--muted)}
  .savemark .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
  .ident{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:20px 22px;margin-bottom:22px;animation:fadeUp .35s .04s ease both}
  .ident .grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:14px}
  .fld label{display:block;font:600 10.5px "JetBrains Mono",monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .fld input,.fld textarea,.fld select{width:100%;padding:9px 11px;border:1px solid var(--line-2);border-radius:var(--r);background:var(--paper);transition:border-color .14s, box-shadow .14s;font-size:13.5px}
  .fld input:focus,.fld textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-glow);background:#fff}
  .fld input.big{font-size:16px;font-weight:600;letter-spacing:-.01em}
  @media(max-width:760px){.ident .grid{grid-template-columns:1fr 1fr}}

  /* ---------- pipeline (assinatura) ---------- */
  .pipe{display:grid;grid-template-columns:repeat(3,1fr);gap:0;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);overflow:hidden;margin-bottom:22px;animation:fadeUp .35s .08s ease both}
  .step{position:relative;display:flex;flex-direction:column;gap:3px;padding:15px 18px 13px;border:none;background:none;text-align:left;border-right:1px solid var(--line);transition:background .14s}
  .step:last-child{border-right:none}
  .step:hover{background:#FBFDFC}
  .step .s-eyebrow{font:600 10px "JetBrains Mono",monospace;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
  .step .s-name{font-size:14px;font-weight:600;color:var(--ink-2);display:flex;align-items:center;gap:8px}
  .step .s-meta{font-size:11.5px;color:var(--muted)}
  .step::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px;background:var(--line);transition:background .2s}
  .step.done::after{background:var(--teal)}
  .step.current{background:var(--teal-soft)}
  .step.current .s-name{color:var(--teal-ink)}
  .step.current::after{background:var(--teal)}
  .step .tick{width:16px;height:16px;border-radius:50%;background:var(--teal);color:#fff;font-size:10px;display:none;align-items:center;justify-content:center}
  .step.done .tick{display:inline-flex}

  /* ---------- panels ---------- */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:20px 22px;margin-bottom:16px;animation:fadeUp .3s ease both}
  .panel > h4{margin:0 0 4px;font-size:14.5px;font-weight:600;letter-spacing:-.01em}
  .panel > .sub{margin:0 0 16px;font-size:12.5px;color:var(--muted)}
  .panel textarea{width:100%;padding:11px 13px;border:1px solid var(--line-2);border-radius:var(--r);background:var(--paper);resize:vertical;line-height:1.55;transition:border-color .14s, box-shadow .14s}
  .panel textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-glow);background:#fff}
  textarea.paste{min-height:170px;font:12.5px/1.6 "JetBrains Mono",monospace}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}

  /* ---------- call blocks ---------- */
  .cblock{border:1px solid var(--line);border-radius:var(--r-lg);background:var(--card);box-shadow:var(--shadow-sm);margin-bottom:12px;overflow:hidden}
  .cb-h{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;background:none;border:none;width:100%;text-align:left}
  .cb-h .bn{width:24px;height:24px;border-radius:8px;background:var(--teal-soft);color:var(--teal-ink);font:600 12px "JetBrains Mono",monospace;display:flex;align-items:center;justify-content:center}
  .cb-h h5{flex:1;margin:0;font-size:13.5px;font-weight:600}
  .cb-h .cnt{font:500 11px "JetBrains Mono",monospace;color:var(--muted)}
  .cb-h .chev{color:var(--muted-2);transition:transform .18s;font-size:12px}
  .cblock.closed .chev{transform:rotate(-90deg)}
  .cb-b{padding:2px 18px 14px;display:grid;grid-template-columns:1fr 1fr;gap:0 22px}
  .cblock.closed .cb-b{display:none}
  @media(max-width:700px){.cb-b{grid-template-columns:1fr}}
  .cf{display:flex;gap:10px;padding:11px 0;border-top:1px solid var(--line)}
  .cf:nth-child(1),.cf:nth-child(2){border-top:none}
  @media(max-width:700px){.cf:nth-child(2){border-top:1px solid var(--line)}}
  .ck{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line-2);background:#fff;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:.14s;color:#fff;font-size:12px;padding:0}
  .ck.on{background:var(--teal);border-color:var(--teal)}
  .cf .body{flex:1;min-width:0}
  .cf label{display:block;font-size:12.5px;font-weight:600;margin-bottom:1px;cursor:pointer}
  .cf .hint{font-size:11px;color:var(--muted);font-weight:400;display:block;margin-bottom:6px}
  .cf textarea{width:100%;padding:7px 9px;font-size:12.5px;min-height:34px;border:1px solid var(--line);border-radius:8px;background:var(--paper);resize:vertical}
  .cf textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-glow);background:#fff}

  /* ---------- rules ---------- */
  .rules{background:var(--amber-soft);border:1px solid var(--amber-line);border-radius:var(--r-lg);padding:14px 18px;margin-bottom:14px}
  .rules h5{margin:0 0 8px;font:600 10.5px "JetBrains Mono",monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--amber)}
  .rules ul{margin:0;padding:0;list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:6px 20px}
  @media(max-width:700px){.rules ul{grid-template-columns:1fr}}
  .rules li{font-size:12.5px;color:#6B4A12;display:flex;gap:7px}
  .rules li::before{content:"—";color:var(--amber)}

  /* ---------- output ---------- */
  .out-wrap{margin-top:14px;display:none}
  .out-wrap.show{display:block;animation:fadeUp .25s ease both}
  .out-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
  .out-bar .t{font:600 11px "JetBrains Mono",monospace;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
  .out{background:var(--paper);border:1px solid var(--line-2);border-radius:var(--r);padding:15px 16px;font:12.5px/1.65 "JetBrains Mono",monospace;white-space:pre-wrap;color:var(--ink-2);max-height:360px;overflow-y:auto}

  /* ---------- producao ---------- */
  .prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:700px){.prod-grid{grid-template-columns:1fr}}
  .prod-grid .span2{grid-column:1/-1}

  /* demandas */
  .dems{display:flex;flex-direction:column}
  .dem-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:14px;padding:11px 0;border-top:1px solid var(--line)}
  .dem-row:first-child{border-top:none}
  .dem-name{font-size:13.5px;font-weight:500}
  .pill.dem-aguardando{background:var(--amber-soft);border-color:var(--amber-line);color:var(--amber)}
  .pill.dem-producao{background:var(--teal-soft);border-color:#BFE3E1;color:var(--teal-ink)}
  .pill.dem-entregue{background:var(--green-soft);border-color:var(--green-line);color:var(--green)}
  .dem-sel{padding:7px 10px;border:1px solid var(--line-2);border-radius:8px;background:var(--paper);font-size:12.5px}
  .dem-sel:focus{outline:none;border-color:var(--teal)}
  .cblock .bn.b0{background:var(--ink);color:#fff}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--ink);color:#fff;border-radius:var(--r);padding:11px 18px;font-size:13px;box-shadow:var(--shadow-lg);transition:.28s;z-index:90;opacity:0;max-width:90vw}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="mark">P</div>
      <h1>Onboarding <span>· Prado &amp; Co</span></h1>
    </div>
    <div class="conn"><span class="led" id="led"></span><span id="connTxt">conectando</span></div>
  </header>
  <div id="view"><div class="loading"><span class="spin"></span><div>carregando clientes…</div></div></div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===== Supabase (mesmo projeto do Esteira) =====
const SUPABASE_URL="https://avitrcjknuphgdgzlmen.supabase.co";
const SUPABASE_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF2aXRyY2prbnVwaGdkZ3psbWVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NjI4MjEsImV4cCI6MjA5ODAzODgyMX0.R7GLAiNMXv76mpti8_Ftwr6DqL3JbLUiwC74PmPFNBw";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);

// ===== blocos da call =====
const BLOCKS=[
  {n:0,title:"Pré-call — assim que fecha",fields:[
    {k:"pc_espiar",label:"Instagram espiado",hint:"Seguidores, o que engaja, o que já postam"},
    {k:"pc_logo",label:"Logo salva",hint:"Foto de perfil p/ grupo e Drive"},
    {k:"pc_grupo",label:"Grupo criado + apresentação",hint:"Mensagem enviada, call marcada"},
    {k:"pc_pedro",label:"Alinhado com o Pedro",hint:"O que foi prometido no fechamento"},
  ]},
  {n:1,title:"Conhecer a farmácia",fields:[
    {k:"tipo",label:"Tipo e tempo de mercado",hint:"Franquia ou própria? Quantos anos?"},
    {k:"func",label:"Funcionários",hint:"Balcão, entrega, escritório"},
    {k:"entrega",label:"Delivery",hint:"Grátis? Taxa? Raio?"},
    {k:"planos",label:"Planos / Farmácia Popular",hint:"Aceita planos? Programa do governo?"},
    {k:"parcel",label:"Parcelamento",hint:"Vezes sem juros + valor mínimo"},
    {k:"promo",label:"Promoções / tabloide",hint:"Mensal ou semanal?"},
    {k:"visual",label:"Identidade visual",hint:"Logo, cores — pedir p/ Drive"},
    {k:"regiao",label:"Cidade e público",hint:"Bairro, perfil (popular, premium)"},
  ]},
  {n:2,title:"Conteúdo",fields:[
    {k:"quem",label:"Quem aparece nos vídeos",hint:"Dono, farmacêutico ou balconista"},
    {k:"forte",label:"Forte de PREÇO",hint:"Onde ganha da concorrência (≠ margem)"},
    {k:"serv",label:"Serviços de saúde",hint:"Aferição, glicemia, aplicações"},
    {k:"ref",label:"Referências",hint:"Perfil que gostem como base"},
  ]},
  {n:3,title:"Apresentar o plano",fields:[
    {k:"acao",label:"Evento semanal",hint:"Café + serviço + promoção — negociar condição com o dono"},
    {k:"video",label:"Vídeo institucional",hint:"Ref. Carol · com rosto · cortado por frase"},
    {k:"img",label:"Imagem de delivery",hint:"Anúncio perpétuo"},
    {k:"trafego",label:"Tráfego pago",hint:"Alcançar a região"},
  ]},
  {n:4,title:"Fechar a call",fields:[
    {k:"login",label:"Login Instagram + Facebook",hint:"Repassar ao tráfego"},
    {k:"bm",label:"BM / conta de anúncios",hint:"Já existe?"},
    {k:"drive",label:"Drive compartilhado",hint:"Criar p/ material bruto"},
    {k:"grav",label:"Dia da gravação",hint:"Data + próximos passos"},
  ]},
];
const CALL_FIELDS=BLOCKS.filter(b=>b.n>0).flatMap(b=>b.fields.map(f=>f.k));
const FASES=["novo","onboarding","producao","ativo"];
const FASE_LBL={novo:"novo",onboarding:"onboarding",producao:"produção",ativo:"ativo"};

// ===== estado =====
let LIST=[],current=null,stage=1,saveTimer=null;
const view=document.getElementById("view");

function setConn(s){const l=document.getElementById("led"),t=document.getElementById("connTxt");
  l.className="led "+(s==="on"?"on":s==="err"?"err":"");t.textContent=s==="on"?"conectado":s==="err"?"sem conexão":"conectando";}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),2200);}
function esc(s){return (s==null?'':''+s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function progressOf(c){const ck=c.checks||{};return Math.round(CALL_FIELDS.filter(k=>ck[k]).length/CALL_FIELDS.length*100);}
function dget(c,k){return ((c.dados||{})[k]||'').trim()||'—';}
function cur(){return LIST.find(c=>c.id===current);}

// ===== dados =====
async function loadAll(){
  const {data,error}=await sb.from("onboardings").select("*").order("criado_em",{ascending:false});
  if(error){setConn("err");view.innerHTML=`<div class="empty"><p>Não foi possível carregar. Verifique se a tabela <b>onboardings</b> existe no Supabase.<br><span style="font-size:12px;color:var(--muted)">${esc(error.message)}</span></p></div>`;return;}
  LIST=data||[];setConn("on");renderHome();
}
function queueSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveNow,500);}
async function saveNow(){
  const c=cur();if(!c)return;
  const {error}=await sb.from("onboardings").update({
    nome:c.nome,cidade:c.cidade,instagram:c.instagram,contatos:c.contatos,
    transcricao_fechamento:c.transcricao_fechamento,overview:c.overview,fase:c.fase,
    dados:c.dados,checks:c.checks,transcricao_onboarding:c.transcricao_onboarding,
    entrega:c.entrega,parcelamento:c.parcelamento,forte_preco:c.forte_preco,
    drive_link:c.drive_link,obs_design:c.obs_design,atualizado_em:new Date().toISOString()
  }).eq("id",c.id);
  if(error)toast("Não salvou: "+error.message);
}

// ===== HOME =====
function renderHome(){
  current=null;
  const rows=LIST.length?`<div class="rows">${LIST.map(c=>{
    const p=progressOf(c),f=c.fase||'novo';
    return `<button class="row" onclick="openCard(${c.id})">
      <span class="id"><span class="nm">${esc(c.nome)||'Sem nome'}</span><span class="mt">${esc(c.cidade)||'—'}${c.instagram?' · '+esc(c.instagram):''}</span></span>
      <span class="prog"><span class="bar"><i style="width:${p}%"></i></span><span class="pct">${p}%</span></span>
      <span class="pill f-${f}">${FASE_LBL[f]||f}</span>
      <span class="del" onclick="event.stopPropagation();delCard(${c.id})" title="Excluir">✕</span>
    </button>`;}).join("")}</div>`
  :`<div class="empty"><p>Nenhum cliente por aqui ainda.</p><button class="btn btn-primary" onclick="createCard()">Adicionar cliente</button></div>`;
  view.innerHTML=`<div class="home-head"><span class="eyebrow">Clientes · ${LIST.length}</span><button class="btn btn-primary" onclick="createCard()">Adicionar cliente</button></div>${rows}`;
}
async function createCard(){
  const {data,error}=await sb.from("onboardings").insert({nome:"",fase:"novo",dados:{},checks:{}}).select().single();
  if(error){toast("Erro ao criar: "+error.message);return;}
  LIST.unshift(data);openCard(data.id);
}
async function delCard(id){
  const c=LIST.find(x=>x.id===id);
  if(!confirm(`Excluir "${c.nome||'sem nome'}"? Esta ação não pode ser desfeita.`))return;
  const {error}=await sb.from("onboardings").delete().eq("id",id);
  if(error){toast("Erro ao excluir");return;}
  LIST=LIST.filter(x=>x.id!==id);renderHome();
}

// ===== EDITOR =====
function openCard(id){current=id;const c=cur();stage=(c.fase==='producao'||c.fase==='ativo')?3:(c.fase==='onboarding')?2:1;renderEditor();}
function goStage(n){stage=n;renderEditor();}
function setF(f,v){const c=cur();c[f]=v;queueSave();}
function setD(k,v){const c=cur();c.dados=c.dados||{};c.dados[k]=v;queueSave();}
function toggleCk(k){const c=cur();c.checks=c.checks||{};c.checks[k]=!c.checks[k];queueSave();renderEditor();}
function setFase(f,msg){const c=cur();c.fase=f;queueSave();if(msg)toast(msg);renderEditor();}

function renderEditor(){
  const c=cur();if(!c){renderHome();return;}
  const p=progressOf(c);
  const fi=FASES.indexOf(c.fase||'novo');
  const stepState=n=>{ // n=1..3 → done | current | ''
    if(n===1) return fi>=1?'done':(stage===1?'current':'');
    if(n===2) return fi>=2?'done':(stage===2?'current':'');
    return c.fase==='ativo'?'done':(stage===3?'current':'');
  };
  view.innerHTML=`
    <div class="ed-top">
      <button class="back" onclick="renderHome()" title="Voltar">←</button>
      <span class="pill f-${c.fase||'novo'}">${FASE_LBL[c.fase||'novo']}</span>
      <span class="savemark"><span class="dot"></span>salvo automaticamente</span>
    </div>

    <div class="ident">
      <div class="grid">
        <div class="fld"><label>Farmácia</label><input class="big" value="${esc(c.nome||'')}" oninput="setF('nome',this.value)" placeholder="Nome da farmácia"></div>
        <div class="fld"><label>Cidade / UF</label><input value="${esc(c.cidade||'')}" oninput="setF('cidade',this.value)" placeholder="—"></div>
        <div class="fld"><label>Instagram</label><input value="${esc(c.instagram||'')}" oninput="setF('instagram',this.value)" placeholder="@"></div>
        <div class="fld"><label>Responsável</label><input value="${esc(c.contatos||'')}" oninput="setF('contatos',this.value)" placeholder="quem decide"></div>
      </div>
    </div>

    <div class="pipe">
      <button class="step ${stepState(1)}" onclick="goStage(1)">
        <span class="s-eyebrow">Etapa 1 · Pedro</span>
        <span class="s-name">Fechamento <span class="tick">✓</span></span>
        <span class="s-meta">transcrição → overview</span>
      </button>
      <button class="step ${stepState(2)}" onclick="goStage(2)">
        <span class="s-eyebrow">Etapa 2 · Bernardo</span>
        <span class="s-name">Onboarding <span class="tick">✓</span></span>
        <span class="s-meta">call preenchida · ${p}%</span>
      </button>
      <button class="step ${stepState(3)}" onclick="goStage(3)">
        <span class="s-eyebrow">Etapa 3 · Zini</span>
        <span class="s-name">Produção <span class="tick">✓</span></span>
        <span class="s-meta">dados prontos p/ design</span>
      </button>
    </div>

    <div id="stageBox"></div>`;
  const box=document.getElementById("stageBox");
  box.innerHTML = stage===1?stage1(c):stage===2?stage2(c):stage3(c);
}

// ---------- Etapa 1 · Pedro ----------
function stage1(c){
  return `
  <div class="panel">
    <h4>Cole a transcrição do fechamento</h4>
    <p class="sub">Pedro: assim que fechar, cole a call aqui. A IA lê e monta o overview para o Bernardo.</p>
    <textarea class="paste" oninput="setF('transcricao_fechamento',this.value)" placeholder="Cole a transcrição completa da call de fechamento…">${esc(c.transcricao_fechamento||'')}</textarea>
    <div class="actions">
      <button class="btn btn-primary" onclick="genOverview(event)">Gerar overview com IA</button>
      <button class="btn" onclick="setFase('onboarding','Cliente movido para onboarding')">Mover para onboarding →</button>
    </div>
  </div>
  <div class="panel">
    <h4>Overview do cliente</h4>
    <p class="sub">O que o Bernardo precisa saber antes da call. Gerado pela IA — pode editar à vontade.</p>
    <textarea style="min-height:170px" oninput="setF('overview',this.value)" placeholder="O overview aparece aqui após a análise.">${esc(c.overview||'')}</textarea>
    ${c.overview?`<div class="actions"><button class="btn btn-sm" onclick="copyText(cur().overview,'Overview copiado')">Copiar overview</button></div>`:''}
  </div>
  <div class="panel">
    <h4>Acessos e prazos · tráfego</h4>
    <p class="sub">O que o Pedro precisa pra rodar anúncio. Marque conforme recebe.</p>
    <div class="prod-grid">
      <div class="fld"><label>Fechado em</label><input type="date" value="${esc((c.dados||{}).d_fechamento||'')}" onchange="setD('d_fechamento',this.value)"></div>
      <div class="fld"><label>Call de onboarding marcada para</label><input type="date" value="${esc((c.dados||{}).d_call||'')}" onchange="setD('d_call',this.value)"></div>
      <div class="fld span2" style="display:flex;gap:22px;flex-wrap:wrap;align-items:center;padding-top:2px">
        <span style="display:flex;align-items:center;gap:8px;font-size:13px"><button class="ck ${(c.checks||{}).ac_insta?'on':''}" onclick="toggleCk('ac_insta')">${(c.checks||{}).ac_insta?'✓':''}</button> Login do Instagram recebido</span>
        <span style="display:flex;align-items:center;gap:8px;font-size:13px"><button class="ck ${(c.checks||{}).ac_face?'on':''}" onclick="toggleCk('ac_face')">${(c.checks||{}).ac_face?'✓':''}</button> Login do Facebook recebido</span>
      </div>
      <div class="fld span2"><label>BM / conta de anúncios</label><input value="${esc((c.dados||{}).ac_bm||'')}" oninput="setD('ac_bm',this.value)" placeholder="ex: já tem BM · conta caiu (criança impulsionada) · vai criar nova"></div>
    </div>
    <p class="sub" style="margin:12px 0 0;color:var(--amber)">Regra do tráfego: nunca impulsionar conteúdo com menores de 18 — foi a causa provável do ban da Drogagin.</p>
  </div>`;
}

// ---------- Etapa 2 · Bernardo ----------
function stage2(c){
  const blocks=BLOCKS.map(b=>{
    const ck=c.checks||{},dd=c.dados||{};
    const done=b.fields.filter(f=>ck[f.k]).length;
    const fields=b.fields.map(f=>`
      <div class="cf">
        <button class="ck ${ck[f.k]?'on':''}" onclick="toggleCk('${f.k}')" title="Marcar como perguntado">${ck[f.k]?'✓':''}</button>
        <div class="body">
          <label onclick="toggleCk('${f.k}')">${f.label}</label>
          <span class="hint">${f.hint}</span>
          <textarea oninput="setD('${f.k}',this.value)" placeholder="anotar…">${esc(dd[f.k]||'')}</textarea>
        </div>
      </div>`).join("");
    return `<div class="cblock">
      <button class="cb-h" onclick="this.parentElement.classList.toggle('closed')">
        <span class="bn ${b.n===0?'b0':''}">${b.n}</span><h5>${b.title}</h5><span class="cnt">${done}/${b.fields.length}</span><span class="chev">▾</span>
      </button>
      <div class="cb-b">${fields}</div>
    </div>`;}).join("");
  return `
  <div class="rules"><h5>Regras de ouro</h5><ul>
    <li>Nunca impulsionar conteúdo com menores de 18 — risco de banimento.</li>
    <li>Prescrição: usar caixa fantasia, nunca a imagem real.</li>
    <li>Login e senha não circulam abertos no grupo.</li>
    <li>Evento semanal com escassez, não oferta fixa diária.</li>
  </ul></div>
  ${blocks}
  <div class="panel">
    <h4>Transcrição do onboarding</h4>
    <p class="sub">Depois da call, cole a transcrição aqui. A IA extrai o resumo completo sozinha.</p>
    <textarea class="paste" oninput="setF('transcricao_onboarding',this.value)" placeholder="Cole a transcrição da call de onboarding…">${esc(c.transcricao_onboarding||'')}</textarea>
    <div class="actions"><button class="btn btn-primary" onclick="genResumoIA(event)">Extrair resumo com IA</button></div>
    <div class="out-wrap" id="outWrap">
      <div class="out-bar"><span class="t" id="outTitle">Saída</span><button class="btn btn-sm" onclick="copyOut()">Copiar</button></div>
      <div class="out" id="outBox"></div>
    </div>
  </div>
  <div class="panel">
    <h4>Entregáveis</h4>
    <p class="sub">Textos prontos a partir do que você preencheu nos blocos.</p>
    <div class="actions" style="margin-top:0">
      <button class="btn btn-sm" onclick="gen('apresentacao')">Mensagem de apresentação</button>
      <button class="btn btn-sm" onclick="gen('roteiro')">Brief do roteiro</button>
      <button class="btn btn-sm" onclick="gen('resumo')">Resumo dos campos</button>
      <button class="btn btn-sm" onclick="gen('drive')">Estrutura do Drive</button>
      <button class="btn btn-sm" onclick="gen('trello')">Cards do Trello</button>
      <button class="btn btn-primary btn-sm" onclick="pushToDesign()">Enviar para produção →</button>
    </div>
  </div>`;
}

// ---------- Etapa 3 · Zini ----------
const DEMANDAS=[["roteiro","Roteiro institucional"],["video","Vídeo institucional"],["imagem","Imagem de frete / delivery"],["tabloide","Tabloide de ofertas"]];
const DEM_LBL={aguardando:"aguardando",producao:"em produção",entregue:"entregue"};
function setDem(k,v){const c=cur();c.dados=c.dados||{};c.dados.demandas=c.dados.demandas||{};c.dados.demandas[k]=v;queueSave();renderEditor();}
function stage3(c){
  const dd=c.dados||{};
  if(!c.entrega&&dd.entrega)c.entrega=dd.entrega;
  if(!c.parcelamento&&dd.parcel)c.parcelamento=dd.parcel;
  if(!c.forte_preco&&dd.forte)c.forte_preco=dd.forte;
  const dem=dd.demandas||{};
  const demRows=DEMANDAS.map(([k,lbl])=>{
    const st=dem[k]||'aguardando';
    return `<div class="dem-row">
      <span class="dem-name">${lbl}</span>
      <span class="pill dem-${st}">${DEM_LBL[st]}</span>
      <select class="dem-sel" onchange="setDem('${k}',this.value)">
        ${Object.keys(DEM_LBL).map(s=>`<option value="${s}" ${s===st?'selected':''}>${DEM_LBL[s]}</option>`).join('')}
      </select>
    </div>`;}).join('');
  return `
  <div class="rules"><h5>Regras de arte</h5><ul>
    <li>Nunca usar crianças em conteúdo impulsionado.</li>
    <li>Medicamento de prescrição: caixa fantasia, nunca a imagem real.</li>
    <li>Validade e regras da oferta sempre na legenda.</li>
    <li>Ref. do institucional: <a href="https://www.instagram.com/reel/DSGXDGgEcdj" target="_blank" rel="noopener">reel da Carol (Ultra Popular)</a>.</li>
  </ul></div>
  <div class="panel">
    <h4>Ficha de produção</h4>
    <p class="sub">Tudo que o design precisa. O que vem da call já chega preenchido — edite à vontade.</p>
    <div class="prod-grid">
      <div class="fld"><label>Entrega / tele-entrega</label><input value="${esc(c.entrega||'')}" oninput="setF('entrega',this.value)" placeholder="ex: grátis acima de R$50, senão R$2"></div>
      <div class="fld"><label>Parcelamento</label><input value="${esc(c.parcelamento||'')}" oninput="setF('parcelamento',this.value)" placeholder="ex: 6x sem juros · mín R$30"></div>
      <div class="fld"><label>Forte de preço</label><input value="${esc(c.forte_preco||'')}" oninput="setF('forte_preco',this.value)" placeholder="ex: fralda, leite, genéricos"></div>
      <div class="fld"><label>Identidade visual</label><input value="${esc(dd.visual||'')}" oninput="setD('visual',this.value)" placeholder="ex: vermelho e branco · logo no Drive"></div>
      <div class="fld span2"><label>Drive (logo + material)</label><input value="${esc(c.drive_link||'')}" oninput="setF('drive_link',this.value)" placeholder="https://drive.google.com/…"></div>
      <div class="fld span2"><label>Observações para o design</label><textarea style="min-height:70px" oninput="setF('obs_design',this.value)" placeholder="cores, referências, regras específicas…">${esc(c.obs_design||'')}</textarea></div>
    </div>
    <div class="actions">
      ${c.drive_link?`<a class="btn btn-sm" href="${esc(c.drive_link)}" target="_blank" rel="noopener">Abrir Drive</a>`:''}
      <button class="btn btn-sm" onclick="copyFicha()">Copiar ficha</button>
    </div>
  </div>
  <div class="panel">
    <h4>Demandas</h4>
    <p class="sub">Status de cada entrega desta farmácia.</p>
    <div class="dems">${demRows}</div>
    <div class="actions"><button class="btn btn-primary btn-sm" onclick="setFase('ativo','Cliente marcado como ativo')">Marcar cliente como ativo</button></div>
  </div>`;
}
function pushToDesign(){
  const c=cur(),dd=c.dados||{};
  c.entrega=c.entrega||dd.entrega||'';c.parcelamento=c.parcelamento||dd.parcel||'';c.forte_preco=c.forte_preco||dd.forte||'';
  c.fase='producao';queueSave();toast("Dados enviados para produção");stage=3;renderEditor();
}
function copyFicha(){
  const c=cur();
  copyText(`FICHA DE PRODUÇÃO — ${c.nome||''} ${c.cidade?'· '+c.cidade:''}
Entrega: ${c.entrega||'—'}
Parcelamento: ${c.parcelamento||'—'}
Forte de preço: ${c.forte_preco||'—'}
Drive: ${c.drive_link||'—'}
Obs: ${c.obs_design||'—'}`,'Ficha copiada');
}

// ===== IA (função serverless /api/overview) =====
async function callIA(transcricao,tipo){
  const r=await fetch('/api/overview',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({transcricao,tipo})});
  const j=await r.json().catch(()=>({}));
  if(!r.ok){
    const msg = r.status===404
      ? "IA ainda não instalada — falta subir a pasta api/ no GitHub e configurar a chave."
      : (j.error||'').includes('não configurada')
        ? "IA ainda não ativada — falta liberar a chave da API (falar com o Pedro)."
        : "IA: "+(j.error||'erro '+r.status);
    throw new Error(msg);
  }
  return j.overview;
}
async function genOverview(ev){
  const c=cur(),t=(c.transcricao_fechamento||'').trim();
  if(!t){toast("Cole a transcrição primeiro");return;}
  const b=ev.target;b.disabled=true;const old=b.textContent;b.textContent="Analisando…";
  try{const ov=await callIA(t,'fechamento');c.overview=ov;queueSave();renderEditor();toast("Overview gerado");}
  catch(e){toast(e.message);b.disabled=false;b.textContent=old;}
}
async function genResumoIA(ev){
  const c=cur(),t=(c.transcricao_onboarding||'').trim();
  if(!t){toast("Cole a transcrição do onboarding primeiro");return;}
  const b=ev.target;b.disabled=true;const old=b.textContent;b.textContent="Analisando…";
  try{const res=await callIA(t,'onboarding');showOut("Resumo da call (IA)",res);b.disabled=false;b.textContent=old;}
  catch(e){toast(e.message);b.disabled=false;b.textContent=old;}
}

// ===== geradores locais =====
function copyText(txt,msg){navigator.clipboard.writeText(txt).then(()=>toast(msg||"Copiado")).catch(()=>toast("Selecione e copie manualmente"));}
let lastOut="";
function showOut(title,txt){
  lastOut=txt;
  const w=document.getElementById("outWrap");if(!w)return;
  document.getElementById("outTitle").textContent=title;
  document.getElementById("outBox").textContent=txt;
  w.classList.add("show");w.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function copyOut(){copyText(lastOut,"Copiado");}

function gen(type){
  const c=cur();
  if(type==='apresentacao'){
    const nome=(c.contatos||'').split(/[,\n]/)[0].trim()||'[nome]';
    showOut("Mensagem de apresentação",`Boa noite, ${nome}! Aqui é o Bernardo, gestor de projetos da Prado & Co. — vou acompanhar a conta de vocês. 🙌

Bora fazer uma call de onboarding pra eu conhecer a farmácia e já alinhar conteúdo e tráfego? É rapidinho, uns 30 min. Me manda 2-3 horários que funcionam pra você que eu confirmo e mando o link. 😊`);
    copyOut();return;
  }
  if(type==='roteiro'){
    showOut("Brief do roteiro institucional",`Monta o roteiro institucional dessa farmácia (4 cenas, ~18-22s, ref. Carol), puxando os diferenciais reais:

Farmácia: ${c.nome||'—'} — ${(c.dados||{}).regiao||c.cidade||'—'}
Tipo/tempo: ${dget(c,'tipo')}
Quem aparece: ${dget(c,'quem')}
Forte de preço: ${dget(c,'forte')}
Parcelamento: ${dget(c,'parcel')}
Entrega: ${dget(c,'entrega')}
Serviços: ${dget(c,'serv')}

Regras: sem crianças; prescrição com caixa fantasia.`);
    copyOut();return;
  }
  if(type==='resumo'){
    showOut("Resumo dos campos",`${(c.nome||'—').toUpperCase()} — ${(c.dados||{}).regiao||c.cidade||'—'}
Responsável: ${c.contatos||'—'}

A FARMÁCIA
• Tipo/tempo: ${dget(c,'tipo')}
• Funcionários: ${dget(c,'func')}
• Entrega: ${dget(c,'entrega')}
• Planos: ${dget(c,'planos')}
• Parcelamento: ${dget(c,'parcel')}
• Promoções: ${dget(c,'promo')}
• Identidade visual: ${dget(c,'visual')}

CONTEÚDO
• Quem aparece: ${dget(c,'quem')}
• Forte de preço: ${dget(c,'forte')}
• Serviços: ${dget(c,'serv')}
• Referências: ${dget(c,'ref')}

Regras: sem crianças · prescrição caixa fantasia · evento semanal (escassez)`);
    copyOut();return;
  }
  if(type==='drive'){
    const base=(c.nome||'Farmacia').replace(/\s+/g,'_');
    showOut("Estrutura do Drive",`📁 ${base}
├── 01_Identidade_Visual
├── 02_Material_Bruto_Gravacao
├── 03_Roteiros
├── 04_Videos_Editados
├── 05_Imagens_Prontas
└── 06_Tabloide_Ofertas`);
    copyOut();return;
  }
  if(type==='trello'){
    const nm=c.nome||'Farmácia';
    showOut("Cards do Trello",`[AGUARDANDO BRIEF] Roteiro institucional — ${nm} → coluna: A produzir
[AGUARDANDO] Vídeo institucional — ${nm} → coluna: Edição de vídeo
[AGUARDANDO] Imagem de frete grátis — ${nm} → coluna: Design
[AGUARDANDO] Tabloide de ofertas — ${nm} → coluna: Design`);
    copyOut();return;
  }
}

loadAll();
</script>
