<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding · Prado &amp; Co</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080a0a; --bg-grad-1:#0b0f0f; --bg-grad-2:#070909; --bg-2:#0f1313;
    --panel:#111616; --panel-2:#161c1c; --panel-3:#1b2222;
    --line:#1e2626; --line-2:#2a3434;
    --ink:#eef2f1; --ink-2:#c4ccca; --muted:#6e7a78; --muted-2:#4a5452;
    --teal:#12A6A6; --turq:#19d3c2; --green:#04BF8A;
    --hot:#19d3c2; --warm:#12A6A6; --warm-bg:#06201f;
    --accent:#19d3c2; --green-bg:#06241a;
    --radius:14px; --radius-lg:18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1100px 600px at 88% -8%, rgba(25,211,194,.07), transparent 55%),
      radial-gradient(900px 500px at 5% 0%, rgba(18,166,166,.05), transparent 50%),
      linear-gradient(180deg, var(--bg-grad-1), var(--bg-grad-2) 60%);
    background-attachment:fixed; color:var(--ink);
    font-family:"Sora",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  ::selection{background:var(--accent);color:#04120f}
  .wrap{max-width:1180px;margin:0 auto;padding:34px 26px 90px}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  header.top{animation:rise .5s cubic-bezier(.2,.7,.2,1) both}

  header.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:10px}
  .brand{display:flex;align-items:center;gap:14px}
  .brand .divider{width:1px;height:26px;background:var(--line-2)}
  .brand h1{font-size:20px;font-weight:600;margin:0;letter-spacing:-.02em}
  .brand h1 span{color:var(--muted);font-weight:400}
  .brand .logobox{width:34px;height:34px;border-radius:9px;background:linear-gradient(160deg,var(--teal),#0b6d6d);display:flex;align-items:center;justify-content:center;font-weight:700;color:#04120f;font-size:17px}
  .conn{display:flex;align-items:center;gap:8px;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--muted);background:var(--panel);border:1px solid var(--line);padding:7px 13px;border-radius:20px}
  .conn .led{width:7px;height:7px;border-radius:50%;background:var(--muted-2)}
  .conn .led.on{background:var(--green);box-shadow:0 0 8px var(--green)}
  .conn .led.err{background:var(--hot)}
  .tagline{color:var(--muted);font-size:13px;margin:0 0 24px;max-width:70ch;line-height:1.6}

  .btn{padding:10px 15px;background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--ink-2);font:inherit;font-size:12.5px;cursor:pointer;font-weight:500;transition:.15s;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{border-color:var(--line-2);color:var(--ink);background:var(--panel-2)}
  .btn-accent{background:var(--accent);border-color:var(--accent);color:#04120f;font-weight:600}
  .btn-accent:hover{background:#22e3d1}
  .btn-sm{padding:7px 11px;font-size:11.5px}

  /* home grid */
  .home-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
  .home-head h2{font-size:16px;font-weight:600;font-family:"JetBrains Mono",monospace;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .ocard{background:linear-gradient(180deg,var(--panel),var(--bg-2));border:1px solid var(--line);border-radius:var(--radius);padding:17px;cursor:pointer;transition:.16s;position:relative;overflow:hidden}
  .ocard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0;transition:.15s}
  .ocard:hover{border-color:var(--line-2);transform:translateY(-2px);box-shadow:0 12px 30px -18px rgba(0,0,0,.8)}
  .ocard:hover::before{opacity:1}
  .ocard h3{font-size:16px;font-weight:600;margin:0 0 4px;letter-spacing:-.01em}
  .ocard .loc{font-size:12px;color:var(--muted);margin-bottom:14px;font-family:"JetBrains Mono",monospace}
  .fase{display:inline-block;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:6px;border:1px solid var(--line-2)}
  .fase-novo{color:var(--muted);background:var(--panel-2)}
  .fase-onboarding{color:#04141a;background:var(--warm);border-color:var(--warm)}
  .fase-producao{color:#04141a;background:var(--turq);border-color:var(--turq)}
  .fase-ativo{color:#03140d;background:var(--green);border-color:var(--green);font-weight:700}
  .prog{display:flex;align-items:center;gap:10px;margin-top:14px}
  .prog-bar{flex:1;height:5px;background:var(--bg-2);border-radius:99px;overflow:hidden}
  .prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:.4s}
  .prog-pct{font-size:11px;color:var(--accent);font-family:"JetBrains Mono",monospace}
  .ocard-del{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:7px;color:var(--muted-2);display:flex;align-items:center;justify-content:center;opacity:0;transition:.15s;font-size:15px;border:none;background:none;cursor:pointer}
  .ocard:hover .ocard-del{opacity:1}
  .ocard-del:hover{background:rgba(255,80,80,.12);color:#ff6b6b}
  .empty{text-align:center;padding:70px 20px;color:var(--muted)}
  .empty p{font-size:14px;margin-bottom:20px}
  .loading{padding:60px;text-align:center;color:var(--muted)}
  .spin{width:22px;height:22px;border:2px solid var(--line-2);border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:s .7s linear infinite;margin-bottom:12px}
  @keyframes s{to{transform:rotate(360deg)}}

  /* editor */
  .ed-head{display:flex;align-items:center;gap:14px;margin-bottom:6px}
  .back{width:38px;height:38px;border-radius:10px;background:var(--panel);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--ink);cursor:pointer;transition:.15s}
  .back:hover{border-color:var(--accent);color:var(--accent)}
  .ed-title{flex:1}
  .ed-title input{font-size:20px;font-weight:600;border:none;width:100%;background:none;letter-spacing:-.02em;padding:4px 0;color:var(--ink)}
  .ed-title input:focus{outline:none}
  .ed-sub{display:flex;gap:8px;margin:0 0 18px 52px;flex-wrap:wrap}
  .mini{padding:7px 11px;border:1px solid var(--line);border-radius:8px;font-size:12px;background:var(--panel);color:var(--ink);max-width:200px;font-family:"JetBrains Mono",monospace}
  .mini:focus{outline:none;border-color:var(--accent)}

  /* stage tabs */
  .tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
  .tab{padding:10px 16px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font:inherit;font-size:13px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:8px}
  .tab:hover{border-color:var(--line-2);color:var(--ink-2)}
  .tab.on{background:var(--panel-2);border-color:var(--accent);color:var(--ink)}
  .tab .tnum{width:20px;height:20px;border-radius:50%;background:var(--bg-2);color:var(--muted);font-size:11px;display:flex;align-items:center;justify-content:center;font-family:"JetBrains Mono",monospace}
  .tab.on .tnum{background:var(--accent);color:#04120f}
  .tab .who{font-size:10px;font-family:"JetBrains Mono",monospace;color:var(--muted-2);text-transform:uppercase;letter-spacing:.05em}

  .stage{display:none;animation:rise .3s ease both}
  .stage.on{display:block}

  .panel{background:linear-gradient(180deg,var(--panel),var(--bg-2));border:1px solid var(--line);border-radius:var(--radius-lg);padding:20px;margin-bottom:14px}
  .panel h4{font-size:13px;font-family:"JetBrains Mono",monospace;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:0 0 14px;display:flex;align-items:center;gap:8px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;color:var(--ink-2);margin-bottom:6px;font-weight:500}
  .field .hint{color:var(--muted);font-weight:400;font-size:11px}
  .field input,.field textarea,.field select{width:100%;padding:10px 12px;background:var(--bg-2);border:1px solid var(--line);border-radius:9px;color:var(--ink);font:inherit;font-size:13px;transition:.15s}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(25,211,194,.08)}
  .field textarea{resize:vertical;min-height:42px;line-height:1.5}
  textarea.big{min-height:180px;font-family:"JetBrains Mono",monospace;font-size:12px}

  /* call blocks */
  .cblock{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;background:var(--bg-2)}
  .cblock-h{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
  .cblock-h .bn{width:24px;height:24px;border-radius:50%;background:var(--panel-3);color:var(--accent);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;font-family:"JetBrains Mono",monospace}
  .cblock-h h5{flex:1;margin:0;font-size:14px;font-weight:600}
  .cblock-h .cnt{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted)}
  .cblock-h .chev{color:var(--muted);transition:.2s}
  .cblock.closed .chev{transform:rotate(-90deg)}
  .cblock-b{padding:2px 16px 10px}
  .cblock.closed .cblock-b{display:none}
  .cfield{display:flex;gap:11px;padding:11px 0;border-top:1px solid var(--line)}
  .cfield:first-child{border-top:none}
  .ck{width:22px;height:22px;border-radius:6px;border:2px solid var(--line-2);flex-shrink:0;margin-top:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;color:#04120f;font-size:13px}
  .ck.on{background:var(--accent);border-color:var(--accent)}
  .cfield .cmain{flex:1}
  .cfield label{display:block;font-size:12.5px;color:var(--ink-2);margin-bottom:5px;font-weight:500}
  .cfield .hint{color:var(--muted);font-weight:400;font-size:11px}
  .cfield textarea{width:100%;padding:8px 10px;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--ink);font:inherit;font-size:12.5px;resize:vertical;min-height:36px}
  .cfield textarea:focus{outline:none;border-color:var(--accent)}

  .rules{background:linear-gradient(90deg,var(--warm-bg),transparent);border:1px solid var(--warm);border-left-width:3px;border-radius:10px;padding:14px 16px;margin-bottom:14px}
  .rules h5{margin:0 0 9px;font-size:12px;font-family:"JetBrains Mono",monospace;letter-spacing:.05em;text-transform:uppercase;color:var(--turq)}
  .rules ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px}
  .rules li{font-size:12.5px;color:var(--ink-2);display:flex;gap:8px}
  .rules li::before{content:'▸';color:var(--warm)}

  .gen-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .out{background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:15px;font-size:12.5px;white-space:pre-wrap;font-family:"JetBrains Mono",monospace;line-height:1.6;color:var(--ink-2);margin-top:12px;max-height:340px;overflow-y:auto}

  .designbox{background:var(--green-bg);border:1px solid var(--green);border-radius:10px;padding:16px;margin-bottom:14px}
  .designbox h4{color:var(--green);margin-bottom:12px}
  .designbox .dg{display:grid;grid-template-columns:1fr;gap:10px}
  .dg-item{background:rgba(0,0,0,.2);border-radius:8px;padding:11px 13px}
  .dg-item .k{font-size:10px;font-family:"JetBrains Mono",monospace;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:4px}
  .dg-item .v{font-size:13px;color:var(--ink)}
  .dg-item .v a{color:var(--turq)}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--panel-2);border:1px solid var(--line-2);border-radius:9px;padding:11px 16px;font-size:12px;font-family:"JetBrains Mono",monospace;transition:.3s;z-index:80;opacity:0}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .autosave{font-size:11px;color:var(--muted);font-family:"JetBrains Mono",monospace;display:flex;align-items:center;gap:7px;margin-left:auto}
  .dotk{width:6px;height:6px;border-radius:50%;background:var(--green)}
  @media(max-width:640px){ .ed-sub{margin-left:0} .tab .who{display:none} }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="logobox">P</div>
      <span class="divider"></span>
      <h1>Onboarding <span>/ farmácia</span></h1>
    </div>
    <div class="conn"><span class="led" id="led"></span><span id="connTxt">conectando…</span></div>
  </header>
  <p class="tagline" id="tagline">Fluxo padrão de entrada de cliente. Pedro cola a call de fechamento, Bernardo conduz o onboarding, e o Zini vê os dados prontos pra produção — tudo salvo e compartilhado.</p>

  <div id="view"></div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===== Supabase (mesmo projeto do Esteira) =====
const SUPABASE_URL="https://avitrcjknuphgdgzlmen.supabase.co";
const SUPABASE_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF2aXRyY2prbnVwaGdkZ3psbWVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NjI4MjEsImV4cCI6MjA5ODAzODgyMX0.R7GLAiNMXv76mpti8_Ftwr6DqL3JbLUiwC74PmPFNBw";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ===== Modelo dos blocos da call =====
const BLOCKS=[
  {n:1,title:"Conhecer a farmácia",fields:[
    {k:"tipo",label:"Tipo e tempo de mercado",hint:"Franquia ou própria? Há quantos anos?"},
    {k:"func",label:"Nº de funcionários",hint:"Balcão, entrega, escritório"},
    {k:"entrega",label:"Delivery",hint:"Grátis? Taxa? Raio de entrega?"},
    {k:"planos",label:"Planos / Farmácia Popular",hint:"Aceita planos? Programa do governo?"},
    {k:"parcel",label:"Parcelamento",hint:"Quantas vezes sem juros + valor mínimo"},
    {k:"promo",label:"Promoções / tabloide",hint:"Mensal ou semanal?"},
    {k:"visual",label:"Identidade visual",hint:"Logo, cores — pedir p/ Drive"},
    {k:"regiao",label:"Cidade / público",hint:"Bairro de atuação, perfil do público"},
  ]},
  {n:2,title:"Conteúdo",fields:[
    {k:"quem",label:"Quem aparece nos vídeos",hint:"Dono, farmacêutico ou balconista"},
    {k:"forte",label:"Segmento forte de PREÇO",hint:"O que ganha da concorrência (≠ maior margem)"},
    {k:"serv",label:"Serviços de saúde",hint:"Aferição, glicemia, aplicações"},
    {k:"ref",label:"Referências",hint:"Perfil que gostem como base"},
  ]},
  {n:3,title:"Apresentar o que vamos fazer",fields:[
    {k:"acao",label:"Ação/evento semanal",hint:"Evento inteiro (café, glicemia) + condição do dono"},
    {k:"video",label:"Vídeo institucional",hint:"Ref. Carol, com rosto, cortado por frase"},
    {k:"img",label:"Imagem de delivery",hint:"Anúncio perpétuo"},
    {k:"trafego",label:"Tráfego pago",hint:"Alcançar a região"},
  ]},
  {n:4,title:"Fechar a call",fields:[
    {k:"login",label:"Login Instagram + Facebook",hint:"Repassar ao tráfego"},
    {k:"bm",label:"BM / conta de anúncios",hint:"Já têm criada?"},
    {k:"drive",label:"Drive compartilhado",hint:"Criar p/ material bruto"},
    {k:"grav",label:"Dia da gravação",hint:"Alinhar data + próximos passos"},
  ]},
];
const CALL_FIELDS=BLOCKS.flatMap(b=>b.fields.map(f=>f.k));

// ===== estado =====
let LIST=[], current=null, saveTimer=null, activeStage=1;
const el=document.getElementById("view");

function setConn(s){ const l=document.getElementById("led"),t=document.getElementById("connTxt");
  l.className="led "+(s==="on"?"on":s==="err"?"err":""); t.textContent=s==="on"?"conectado":s==="err"?"erro de conexão":"conectando…"; }
function toast(m,err){ const t=document.getElementById("toast"); t.textContent=m; t.className="toast show"; setTimeout(()=>t.className="toast",2200); }
function esc(s){ return (s==null?'':''+s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function progressOf(c){ const ck=c.checks||{}; const d=CALL_FIELDS.filter(k=>ck[k]).length; return Math.round(d/CALL_FIELDS.length*100); }
function d(c,k){ return ((c.dados||{})[k]||'').trim() || '—'; }

// ===== carregar =====
async function loadAll(){
  const {data,error}=await sb.from("onboardings").select("*").order("criado_em",{ascending:false});
  if(error){ setConn("err"); el.innerHTML='<div class="empty"><p>Erro ao carregar: '+esc(error.message)+'</p><p style="font-size:12px">Confira se a tabela <b>onboardings</b> foi criada no Supabase.</p></div>'; return; }
  LIST=data||[]; setConn("on"); renderHome();
}

// ===== HOME =====
function renderHome(){
  document.getElementById("tagline").style.display="";
  const faseLabel={novo:"novo",onboarding:"onboarding",producao:"produção",ativo:"ativo"};
  const cards = LIST.length ? `<div class="cards">${LIST.map(c=>{
    const p=progressOf(c), f=c.fase||'novo';
    return `<div class="ocard" onclick="openCard(${c.id})">
      <button class="ocard-del" onclick="event.stopPropagation();delCard(${c.id})">🗑</button>
      <h3>${esc(c.nome)||'Sem nome'}</h3>
      <div class="loc">${esc(c.cidade)||'—'}</div>
      <span class="fase fase-${f}">${faseLabel[f]||f}</span>
      <div class="prog"><div class="prog-bar"><div class="prog-fill" style="width:${p}%"></div></div><span class="prog-pct">${p}%</span></div>
    </div>`;
  }).join("")}</div>` :
    `<div class="empty"><p>Nenhum cliente ainda.</p><button class="btn btn-accent" onclick="createCard()">+ Novo cliente</button></div>`;

  el.innerHTML=`<div class="home-head"><h2>Clientes · ${LIST.length}</h2><button class="btn btn-accent" onclick="createCard()">+ Novo cliente</button></div>${cards}`;
}

async function createCard(){
  const {data,error}=await sb.from("onboardings").insert({nome:"Nova farmácia",fase:"novo",dados:{},checks:{}}).select().single();
  if(error){ toast("erro ao criar",true); return; }
  LIST.unshift(data); openCard(data.id);
}
async function delCard(id){
  const c=LIST.find(x=>x.id===id);
  if(!confirm(`Excluir "${c.nome}"? Não volta.`)) return;
  const {error}=await sb.from("onboardings").delete().eq("id",id);
  if(error){ toast("erro ao excluir",true); return; }
  LIST=LIST.filter(x=>x.id!==id); renderHome();
}
function cur(){ return LIST.find(c=>c.id===current); }

// ===== salvar (debounce) =====
function queueSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(saveNow,500); }
async function saveNow(){
  const c=cur(); if(!c) return;
  const patch={
    nome:c.nome, cidade:c.cidade, instagram:c.instagram, contatos:c.contatos,
    transcricao_fechamento:c.transcricao_fechamento, overview:c.overview, fase:c.fase,
    dados:c.dados, checks:c.checks, transcricao_onboarding:c.transcricao_onboarding,
    entrega:c.entrega, parcelamento:c.parcelamento, forte_preco:c.forte_preco,
    drive_link:c.drive_link, obs_design:c.obs_design, atualizado_em:new Date().toISOString()
  };
  const {error}=await sb.from("onboardings").update(patch).eq("id",c.id);
  if(error) toast("não salvou: "+error.message,true); else toast("salvo ✓");
}

// ===== EDITOR =====
function openCard(id){ current=id; activeStage=1; renderEditor(); }
function backHome(){ current=null; renderHome(); }

function renderEditor(){
  const c=cur(); if(!c){ backHome(); return; }
  document.getElementById("tagline").style.display="none";
  const p=progressOf(c);
  el.innerHTML=`
    <div class="ed-head">
      <button class="back" onclick="backHome()">←</button>
      <div class="ed-title"><input value="${esc(c.nome)}" oninput="setF('nome',this.value)" placeholder="Nome da farmácia"></div>
      <div class="autosave"><span class="dotk"></span> salvo automaticamente</div>
    </div>
    <div class="ed-sub">
      <input class="mini" value="${esc(c.cidade||'')}" oninput="setF('cidade',this.value)" placeholder="cidade / uf">
      <input class="mini" value="${esc(c.instagram||'')}" oninput="setF('instagram',this.value)" placeholder="@ instagram">
      <input class="mini" value="${esc(c.contatos||'')}" oninput="setF('contatos',this.value)" placeholder="contato + whatsapp" style="max-width:240px">
    </div>
    <div class="tabs">
      <button class="tab ${activeStage===1?'on':''}" onclick="goStage(1)"><span class="tnum">1</span> Fechamento <span class="who">Pedro</span></button>
      <button class="tab ${activeStage===2?'on':''}" onclick="goStage(2)"><span class="tnum">2</span> Onboarding <span class="who">Bernardo</span></button>
      <button class="tab ${activeStage===3?'on':''}" onclick="goStage(3)"><span class="tnum">3</span> Produção <span class="who">Zini</span></button>
    </div>
    <div id="stageBox"></div>`;
  renderStage();
}
function goStage(n){ activeStage=n; renderStage(); document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===n-1)); }

function renderStage(){
  const c=cur(); const box=document.getElementById("stageBox");
  if(activeStage===1) box.innerHTML=stage1(c);
  else if(activeStage===2){ box.innerHTML=stage2(c); wireBlocks(); }
  else box.innerHTML=stage3(c);
}

// ---- Estágio 1: Pedro ----
function stage1(c){
  return `<div class="stage on">
    <div class="panel">
      <h4>📥 Call de fechamento (Pedro cola aqui)</h4>
      <div class="field">
        <label>Transcrição da call de fechamento <span class="hint">cole tudo aqui — dados básicos do cliente saem daqui</span></label>
        <textarea class="big" oninput="setF('transcricao_fechamento',this.value)" placeholder="Cole a transcrição da call de fechamento do cliente...">${esc(c.transcricao_fechamento||'')}</textarea>
      </div>
      <div class="gen-row">
        <button class="btn btn-accent btn-sm" onclick="genOverview()">✎ Gerar overview p/ Bernardo</button>
        <button class="btn btn-sm" onclick="setStageFase('onboarding')">→ Marcar como 'em onboarding'</button>
      </div>
    </div>
    <div class="panel">
      <h4>📋 Overview do cliente</h4>
      <div class="field">
        <label>Resumo pra você já entrar na call sabendo tudo</label>
        <textarea style="min-height:150px" oninput="setF('overview',this.value)" placeholder="O overview gerado aparece aqui (ou escreva manualmente).">${esc(c.overview||'')}</textarea>
      </div>
    </div>
  </div>`;
}

// gera um overview simples a partir da transcrição (heurística, sem IA por enquanto)
function genOverview(){
  const c=cur(); const t=(c.transcricao_fechamento||'').trim();
  if(!t){ toast("cole a transcrição primeiro",true); return; }
  // rascunho: usa nome/cidade/contato já preenchidos + destaca que precisa revisar
  const ov=`OVERVIEW — ${c.nome||'(nome)'} ${c.cidade?'· '+c.cidade:''}
Instagram: ${c.instagram||'—'}
Contato: ${c.contatos||'—'}

⚠ Rascunho a partir da transcrição de fechamento. Revise e complete na call de onboarding.

Pontos a confirmar na call:
• Tempo de mercado / franquia ou própria
• Entrega (grátis? taxa? raio) e parcelamento
• Segmento forte de preço
• Login Instagram + Facebook (pedir)

[Transcrição completa salva na aba Fechamento para consulta.]`;
  c.overview=ov; queueSave(); renderStage();
  toast("overview gerado (rascunho) ✓");
}

// ---- Estágio 2: Bernardo ----
function stage2(c){
  const blocks=BLOCKS.map(b=>{
    const ck=c.checks||{}, dd=c.dados||{};
    const done=b.fields.filter(f=>ck[f.k]).length;
    const fields=b.fields.map(f=>`
      <div class="cfield">
        <div class="ck ${ck[f.k]?'on':''}" onclick="toggleCk('${f.k}')">${ck[f.k]?'✓':''}</div>
        <div class="cmain">
          <label>${f.label} <span class="hint">${f.hint}</span></label>
          <textarea oninput="setD('${f.k}',this.value)" placeholder="anotar…">${esc(dd[f.k]||'')}</textarea>
        </div>
      </div>`).join("");
    return `<div class="cblock">
      <div class="cblock-h" onclick="this.parentElement.classList.toggle('closed')">
        <span class="bn">${b.n}</span><h5>${b.title}</h5><span class="cnt">${done}/${b.fields.length}</span><span class="chev">▾</span>
      </div>
      <div class="cblock-b">${fields}</div>
    </div>`;
  }).join("");
  return `<div class="stage on">
    <div class="rules"><h5>⚠ Regras de ouro</h5><ul>
      <li>Nunca impulsionar conteúdo com crianças (menor de 18) — risco de ban.</li>
      <li>Prescrição: usar caixa "fantasia", nunca a imagem real.</li>
      <li>Não deixar login/senha circulando aberto no grupo.</li>
      <li>Evento semanal com escassez (não oferta fixa todo dia).</li>
    </ul></div>
    ${blocks}
    <div class="panel">
      <h4>📥 Transcrição do onboarding (cole após a call)</h4>
      <div class="field"><textarea class="big" oninput="setF('transcricao_onboarding',this.value)" placeholder="Cole aqui a transcrição da call de onboarding...">${esc(c.transcricao_onboarding||'')}</textarea></div>
    </div>
    <div class="panel">
      <h4>⚡ Gerar entregáveis</h4>
      <div class="gen-row">
        <button class="btn btn-sm" onclick="gen('apresentacao')">👋 Apresentação</button>
        <button class="btn btn-sm" onclick="gen('roteiro')">🎬 Brief do roteiro</button>
        <button class="btn btn-sm" onclick="gen('resumo')">📋 Resumo da call</button>
        <button class="btn btn-sm" onclick="gen('drive')">📁 Estrutura Drive</button>
        <button class="btn btn-sm" onclick="gen('trello')">🗂 Cards Trello</button>
        <button class="btn btn-accent btn-sm" onclick="pushToDesign()">→ Enviar dados p/ Produção (Zini)</button>
      </div>
      <div class="out" id="genOut" style="display:none"></div>
    </div>
  </div>`;
}

function wireBlocks(){ /* blocks self-wire via inline handlers */ }
function toggleCk(k){ const c=cur(); c.checks=c.checks||{}; c.checks[k]=!c.checks[k]; queueSave(); renderStage(); }
function setD(k,v){ const c=cur(); c.dados=c.dados||{}; c.dados[k]=v; queueSave(); }
function setF(f,v){ const c=cur(); c[f]=v; queueSave(); }
function setStageFase(f){ const c=cur(); c.fase=f; queueSave(); toast("fase: "+f); }

// puxa os campos da call pros campos de design
function pushToDesign(){
  const c=cur(); const dd=c.dados||{};
  c.entrega = c.entrega || dd.entrega || '';
  c.parcelamento = c.parcelamento || dd.parcel || '';
  c.forte_preco = c.forte_preco || dd.forte || '';
  c.fase='producao';
  queueSave(); toast("enviado p/ Produção ✓"); goStage(3); renderStage();
}

// ---- Estágio 3: Zini ----
function stage3(c){
  const dd=c.dados||{};
  const entrega=c.entrega||dd.entrega||'—';
  const parc=c.parcelamento||dd.parcel||'—';
  const forte=c.forte_preco||dd.forte||'—';
  const drive=c.drive_link||'';
  return `<div class="stage on">
    <div class="designbox">
      <h4>🎨 Dados pra produção (Zini)</h4>
      <div class="dg">
        <div class="dg-item"><div class="k">Farmácia</div><div class="v">${esc(c.nome||'—')} ${c.cidade?'· '+esc(c.cidade):''}</div></div>
        <div class="dg-item"><div class="k">Entrega / tele-entrega</div><div class="v">${esc(entrega)}</div></div>
        <div class="dg-item"><div class="k">Parcelamento</div><div class="v">${esc(parc)}</div></div>
        <div class="dg-item"><div class="k">Forte de preço</div><div class="v">${esc(forte)}</div></div>
        <div class="dg-item"><div class="k">Drive (logo + material)</div><div class="v">${drive?`<a href="${esc(drive)}" target="_blank">${esc(drive)}</a>`:'—'}</div></div>
      </div>
    </div>
    <div class="panel">
      <h4>Editar dados de produção</h4>
      <div class="field"><label>Entrega / tele-entrega</label><input value="${esc(c.entrega||'')}" oninput="setF('entrega',this.value)" placeholder="ex: grátis acima de R$50, senão R$2"></div>
      <div class="field"><label>Parcelamento</label><input value="${esc(c.parcelamento||'')}" oninput="setF('parcelamento',this.value)" placeholder="ex: 6x sem juros, mín R$30"></div>
      <div class="field"><label>Segmento forte de preço</label><input value="${esc(c.forte_preco||'')}" oninput="setF('forte_preco',this.value)" placeholder="ex: fralda, leite, genéricos"></div>
      <div class="field"><label>Link do Drive (logo + material)</label><input value="${esc(c.drive_link||'')}" oninput="setF('drive_link',this.value)" placeholder="https://drive.google.com/..."></div>
      <div class="field"><label>Observações pro design</label><textarea oninput="setF('obs_design',this.value)" placeholder="cores, referências, regras específicas…">${esc(c.obs_design||'')}</textarea></div>
      <div class="gen-row"><button class="btn btn-accent btn-sm" onclick="setStageFase('ativo')">✓ Marcar cliente como ativo</button></div>
    </div>
  </div>`;
}

// ===== geradores de texto =====
function nameOf(c){ return c.nome||'Farmácia'; }
function regionOf(c){ const dd=c.dados||{}; return (dd.regiao||'').trim()||(c.cidade||'').trim()||'—'; }
function show(out){ const o=document.getElementById("genOut"); o.style.display="block"; o.textContent=out; o.scrollIntoView({behavior:'smooth',block:'nearest'});
  navigator.clipboard.writeText(out).then(()=>toast("copiado ✓")); }

function gen(type){
  const c=cur(); const dd=c.dados||{};
  if(type==='apresentacao'){
    const nome=(c.contatos||'').split(/[,\n]/)[0].trim()||'[nome]';
    show(`Boa noite, ${nome}! Aqui é o Bernardo, gestor de projetos da Prado & Co. — vou acompanhar a conta de vocês. 🙌

Bora fazer uma call de onboarding pra eu conhecer a farmácia e já alinhar conteúdo e tráfego? É rapidinho, uns 30 min. Me manda 2-3 horários que funcionam pra você que eu confirmo e mando o link. 😊`); return;
  }
  if(type==='roteiro'){
    show(`Monta o roteiro institucional dessa farmácia (4 cenas, ~18-22s, ref. Carol), puxando os diferenciais reais:

Farmácia: ${nameOf(c)} — ${regionOf(c)}
Tipo/tempo: ${d(c,'tipo')}
Quem aparece: ${d(c,'quem')}
Segmento forte de preço: ${d(c,'forte')}
Parcelamento: ${d(c,'parcel')}
Entrega: ${d(c,'entrega')}
Serviços: ${d(c,'serv')}

Regras: sem crianças; prescrição com caixa fantasia.`); return;
  }
  if(type==='resumo'){
    show(`${nameOf(c).toUpperCase()} — ${regionOf(c)}
Contato: ${c.contatos||'—'}

A FARMÁCIA
• Tipo/tempo: ${d(c,'tipo')}
• Funcionários: ${d(c,'func')}
• Entrega: ${d(c,'entrega')}
• Planos: ${d(c,'planos')}
• Parcelamento: ${d(c,'parcel')}
• Promoções: ${d(c,'promo')}
• Identidade visual: ${d(c,'visual')}

CONTEÚDO
• Quem aparece: ${d(c,'quem')}
• Forte de preço: ${d(c,'forte')}
• Serviços: ${d(c,'serv')}
• Referências: ${d(c,'ref')}

⚠ Regras: sem crianças · prescrição caixa fantasia · evento semanal (escassez)`); return;
  }
  if(type==='drive'){
    const base=nameOf(c).replace(/\s+/g,'_');
    show(`📁 ${base}
├── 01_Identidade_Visual
├── 02_Material_Bruto_Gravacao
├── 03_Roteiros
├── 04_Videos_Editados
├── 05_Imagens_Prontas
└── 06_Tabloide_Ofertas`); return;
  }
  if(type==='trello'){
    const nm=nameOf(c);
    show(`[AGUARDANDO BRIEF] Roteiro institucional — ${nm} → coluna: A produzir
[AGUARDANDO] Vídeo institucional — ${nm} → coluna: Edição de vídeo
[AGUARDANDO] Imagem de frete grátis — ${nm} → coluna: Design
[AGUARDANDO] Tabloide de ofertas — ${nm} → coluna: Design`); return;
  }
}

setConn("");
loadAll();
</script>
</body>
