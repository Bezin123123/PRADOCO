<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esteira · Prado &amp; Co</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080a0a;
    --bg-grad-1:#0b0f0f;
    --bg-grad-2:#070909;
    --bg-2:#0f1313;
    --panel:#111616;
    --panel-2:#161c1c;
    --panel-3:#1b2222;
    --line:#1e2626;
    --line-2:#2a3434;
    --ink:#eef2f1;
    --ink-2:#c4ccca;
    --muted:#6e7a78;
    --muted-2:#4a5452;
    --teal:#12A6A6;
    --turq:#19d3c2;
    --green:#04BF8A;
    --hot:#19d3c2;
    --hot-bg:#072420;
    --warm:#12A6A6;
    --warm-bg:#06201f;
    --cold:#4a5452;
    --cold-bg:#0f1313;
    --green-bg:#06241a;
    --accent:#19d3c2;
    --glow:0 0 40px -8px rgba(25,211,194,.35);
    --radius:14px;
    --radius-lg:18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1100px 600px at 88% -8%, rgba(25,211,194,.07), transparent 55%),
      radial-gradient(900px 500px at 5% 0%, rgba(18,166,166,.05), transparent 50%),
      linear-gradient(180deg, var(--bg-grad-1), var(--bg-grad-2) 60%);
    background-attachment:fixed;
    color:var(--ink);
    font-family:"Sora",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  ::selection{background:var(--accent);color:#04120f}
  .wrap{max-width:1280px;margin:0 auto;padding:34px 26px 90px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  header.top{animation:rise .5s cubic-bezier(.2,.7,.2,1) both}
  .tagline{animation:rise .5s .05s cubic-bezier(.2,.7,.2,1) both}
  .rail{animation:rise .55s .1s cubic-bezier(.2,.7,.2,1) both}
  .toolbar{animation:rise .55s .16s cubic-bezier(.2,.7,.2,1) both}
  .panel{animation:rise .6s .22s cubic-bezier(.2,.7,.2,1) both}

  /* header */
  header.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:10px}
  .brand{display:flex;align-items:center;gap:14px}
  .brand .logo{height:34px;width:auto;display:block}
  .brand .divider{width:1px;height:26px;background:var(--line-2)}
  .brand h1{font-size:20px;font-weight:600;margin:0;letter-spacing:-.02em}
  .brand h1 span{color:var(--muted);font-weight:400}
  .conn{display:flex;align-items:center;gap:8px;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--muted);background:var(--panel);border:1px solid var(--line);padding:7px 13px;border-radius:20px}
  .conn .led{width:7px;height:7px;border-radius:50%;background:var(--muted-2);position:relative}
  .conn .led.on{background:var(--green);box-shadow:0 0 0 0 rgba(4,191,138,.5);animation:pulse 2.4s infinite}
  .conn .led.err{background:var(--hot)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(4,191,138,.5)}70%{box-shadow:0 0 0 6px rgba(4,191,138,0)}100%{box-shadow:0 0 0 0 rgba(4,191,138,0)}}
  .tagline{color:var(--muted);font-size:13px;margin:0 0 26px;max-width:62ch;line-height:1.6}

  /* temperature rail */
  .rail{display:grid;grid-template-columns:repeat(3,1fr) repeat(3,.72fr);gap:12px;margin-bottom:20px}
  .tcard{background:linear-gradient(160deg,var(--panel),var(--bg-2));border:1px solid var(--line);border-radius:var(--radius);padding:16px 17px;cursor:pointer;
    transition:transform .18s cubic-bezier(.4,0,.2,1),border-color .18s,box-shadow .18s;position:relative;overflow:hidden}
  .tcard::after{content:"";position:absolute;inset:0;background:radial-gradient(120px 80px at 80% 0%,var(--sel,transparent),transparent 70%);opacity:0;transition:opacity .25s;pointer-events:none}
  .tcard:hover{border-color:var(--line-2);transform:translateY(-2px);box-shadow:0 12px 30px -18px rgba(0,0,0,.8)}
  .tcard:hover::after{opacity:.08}
  .tcard.active{border-color:var(--sel);box-shadow:0 0 0 1px var(--sel),0 10px 30px -16px var(--sel)}
  .tcard.active::after{opacity:.12}
  .tcard .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .tcard .ico{font-size:15px}
  .tcard .pct{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted-2)}
  .tcard .n{font-family:"Sora",sans-serif;font-size:32px;font-weight:700;line-height:1;margin-bottom:3px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .tcard .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .tcard.t-hot{--sel:var(--hot)} .tcard.t-hot .n{color:var(--hot)}
  .tcard.t-warm{--sel:var(--warm)} .tcard.t-warm .n{color:var(--warm)}
  .tcard.t-cold{--sel:var(--cold)} .tcard.t-cold .n{color:var(--cold)}
  .tcard.mini{background:var(--bg-2)}
  .tcard.mini .n{font-size:21px;color:var(--ink)}
  .tcard.t-done .n{color:var(--green)}
  .tprog{height:4px;background:var(--bg-2);border-radius:3px;margin-top:10px;overflow:hidden}
  .tprog i{display:block;height:100%;border-radius:3px;transition:width .4s}
  .tcard.t-hot .tprog i{background:var(--hot)} .tcard.t-warm .tprog i{background:var(--warm)} .tcard.t-cold .tprog i{background:var(--cold)}
  .tprog-lbl{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--muted-2);margin-top:5px}

  /* toolbar */
  .toolbar{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .search{flex:1;min-width:200px;position:relative}
  .search input{width:100%;padding:11px 13px 11px 36px;background:var(--panel);border:1px solid var(--line);border-radius:10px;
    color:var(--ink);font:inherit;font-size:13px;transition:border-color .15s,box-shadow .15s}
  .search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(25,211,194,.1)}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted-2)}
  select.f,input.f{padding:11px 13px;background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--ink-2);font:inherit;font-size:12px;cursor:pointer;transition:border-color .15s}
  select.f:focus,input.f:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(25,211,194,.1)}
  .btn{padding:11px 14px;background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--ink-2);font:inherit;font-size:12px;cursor:pointer;font-weight:500;transition:border-color .15s,color .15s,background .15s}
  .btn:hover{border-color:var(--line-2);color:var(--ink);background:var(--panel-2)}
  .btn-accent{background:var(--accent);border-color:var(--accent);color:#04120f;font-weight:600}
  .btn-accent:hover{background:#22e3d1;color:#04120f}

  /* table */
  .panel{background:linear-gradient(180deg,var(--panel),var(--bg-2));border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 20px 50px -30px rgba(0,0,0,.9)}
  .tbl-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:880px}
  thead th{text-align:left;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);font-weight:500;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--bg-2);
    cursor:pointer;user-select:none;white-space:nowrap}
  thead th:hover{color:var(--ink)}
  tbody td{padding:13px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
  tbody tr{transition:background .12s}
  tbody tr:hover{background:var(--panel-2)}
  tbody tr:last-child td{border-bottom:none}
  .temp-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:10px;vertical-align:0}
  .d-hot{background:var(--hot);box-shadow:0 0 8px var(--hot)} .d-warm{background:var(--warm);box-shadow:0 0 6px -1px var(--warm)} .d-cold{background:var(--cold)}
  .handle{font-weight:500;display:flex;align-items:center;font-size:13.5px}
  .handle a{color:var(--ink-2);text-decoration:none;transition:color .12s}
  .handle a:hover{color:var(--accent)}
  .cat{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted)}
  .cat .chip{background:var(--panel-2);border:1px solid var(--line);border-radius:5px;padding:1px 7px;color:var(--ink)}
  .sb{font-size:14px}
  .status-pill{appearance:none;border:1px solid var(--line-2);border-radius:7px;padding:6px 26px 6px 12px;font:inherit;font-size:11px;font-weight:600;
    cursor:pointer;color:var(--ink);letter-spacing:.02em;
    background:var(--panel-2) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%237e8794' stroke-width='2.5'><path d='M6 9l6 6 6-6'/></svg>") no-repeat right 8px center}
  .st-novo{color:var(--muted);background-color:var(--panel-2)}
  .st-abordado{color:#0c0c0c;background-color:var(--warm);border-color:var(--warm)}
  .st-conversa{color:#04141a;background-color:var(--turq);border-color:var(--turq)}
  .st-fechou{color:#03140d;background-color:var(--green);border-color:var(--green);font-weight:700}
  .st-perdido{color:var(--muted-2);background-color:transparent;border-color:var(--line);text-decoration:line-through}
  /* linha tingida por status */
  tr[data-st="abordado"]{box-shadow:inset 3px 0 0 var(--warm)}
  tr[data-st="conversa"]{box-shadow:inset 3px 0 0 var(--turq);background:rgba(17,191,174,.04)}
  tr[data-st="fechou"]{box-shadow:inset 3px 0 0 var(--green);background:rgba(4,191,138,.06)}
  tr[data-st="perdido"]{opacity:.45}
  .ed{background:transparent;border:1px solid transparent;border-radius:6px;padding:5px 7px;font:inherit;font-size:12px;color:var(--ink);width:100%}
  .ed:hover{background:var(--panel-2)} .ed:focus{outline:none;background:var(--bg-2);border-color:var(--line-2)}
  .ed.resp{max-width:110px;font-family:"JetBrains Mono",monospace;font-size:11px}
  .touch{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);white-space:nowrap}
  .touch.stale{color:var(--hot)}

  .foot{margin-top:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;
    font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted)}
  .pg{display:flex;gap:6px;align-items:center}
  .pg button{padding:6px 11px;font-family:"Sora",sans-serif}
  .pg button:disabled{opacity:.35;cursor:default}

  .loading{padding:70px 20px;text-align:center;color:var(--muted)}
  .spin{width:22px;height:22px;border:2px solid var(--line-2);border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:s 0.7s linear infinite;margin-bottom:14px}
  @keyframes s{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--panel-2);border:1px solid var(--line-2);
    border-radius:9px;padding:11px 16px;font-size:12px;font-family:"JetBrains Mono",monospace;transition:.3s;z-index:50;opacity:0}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .retbanner{background:linear-gradient(90deg,var(--warm-bg),transparent);border:1px solid var(--warm);border-left-width:3px;
    border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s}
  .retbanner:hover{background:linear-gradient(90deg,var(--warm-bg),rgba(232,168,56,.04))}
  .retbanner .rb-ico{font-size:18px}
  .retbanner .rb-txt{font-size:13px;color:var(--ink)}
  .retbanner .rb-txt b{color:var(--warm)}
  .retbanner .rb-go{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--warm)}

  /* ficha do lead (drawer) */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.2s;z-index:60}
  .scrim.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:min(440px,92vw);background:var(--panel);border-left:1px solid var(--line-2);
    transform:translateX(100%);transition:transform .24s cubic-bezier(.4,0,.2,1);z-index:61;display:flex;flex-direction:column;overflow:hidden}
  .drawer.open{transform:translateX(0)}
  .dh{padding:20px 22px 16px;border-bottom:1px solid var(--line)}
  .dh .row1{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .dh .han{font-size:19px;font-weight:600;display:flex;align-items:center;gap:10px}
  .dh .han a{color:var(--ink);text-decoration:none}
  .dh .han a:hover{color:var(--accent)}
  .dclose{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:4px}
  .dclose:hover{color:var(--ink)}
  .dmeta{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .dmeta .mtag{font-family:"JetBrains Mono",monospace;font-size:11px;padding:4px 9px;border-radius:6px;border:1px solid var(--line);color:var(--muted)}
  .dmeta .mtag b{color:var(--ink);font-weight:500}
  .temp-btns{display:flex;gap:6px;margin-top:14px}
  .temp-btns button{flex:1;padding:8px;border-radius:8px;border:1px solid var(--line);background:var(--bg-2);color:var(--muted);font:inherit;font-size:11px;cursor:pointer;transition:.12s}
  .temp-btns button:hover{border-color:var(--line-2)}
  .temp-btns button.on.h{background:var(--hot-bg);border-color:var(--hot);color:var(--hot)}
  .temp-btns button.on.w{background:var(--warm-bg);border-color:var(--warm);color:#5fd6c8}
  .temp-btns button.on.c{background:var(--panel-2);border-color:var(--line-2);color:var(--ink)}
  .dbody{flex:1;overflow-y:auto;padding:18px 22px}
  .dsec{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 10px}
  .dfield{margin-bottom:18px}
  .dfield label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .dfield select,.dfield input{width:100%;padding:9px 11px;background:var(--bg-2);border:1px solid var(--line);border-radius:8px;color:var(--ink);font:inherit;font-size:13px}
  .dfield select:focus,.dfield input:focus{outline:none;border-color:var(--accent)}
  .notes{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
  .note{background:var(--bg-2);border:1px solid var(--line);border-radius:9px;padding:10px 12px}
  .note .meta{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted-2);margin-bottom:4px;display:flex;justify-content:space-between}
  .note .txt{font-size:13px;color:var(--ink);line-height:1.45;white-space:pre-wrap}
  .note .del{background:none;border:none;color:var(--muted-2);cursor:pointer;font-size:11px}
  .note .del:hover{color:var(--hot)}
  .note-add{display:flex;flex-direction:column;gap:8px}
  .note-add textarea{width:100%;min-height:70px;resize:vertical;padding:10px 12px;background:var(--bg-2);border:1px solid var(--line);border-radius:9px;color:var(--ink);font:inherit;font-size:13px}
  .note-add textarea:focus{outline:none;border-color:var(--accent)}
  .note-empty{color:var(--muted-2);font-size:12px;font-style:italic;padding:6px 0}

  @media(max-width:720px){
    .rail{grid-template-columns:repeat(3,1fr)}
    .tcard.mini{display:none}
  }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://avitrcjknuphgdgzlmen.supabase.co";
const SUPABASE_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF2aXRyY2prbnVwaGdkZ3psbWVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NjI4MjEsImV4cCI6MjA5ODAzODgyMX0.R7GLAiNMXv76mpti8_Ftwr6DqL3JbLUiwC74PmPFNBw";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const STATUS={novo:"não abordado",abordado:"abordado",conversa:"em conversa",fechou:"fechou",perdido:"perdido"};
let DATA=[], view=[], page=0; const PER=60;
let sortKey="temp", sortDir=-1, activeTemp="", activeStatus="", onlyReturns=false;

function tempOf(r){ const p=r.prioridade||0; return p>=3?"hot":p>=1?"warm":"cold"; }
function tempRank(r){ return {hot:2,warm:1,cold:0}[tempOf(r)]; }

function setConn(state){
  const led=document.getElementById("led"), txt=document.getElementById("connTxt");
  led.className="led "+(state==="on"?"on":state==="err"?"err":"");
  txt.textContent = state==="on"?"tempo real ativo":state==="err"?"erro de conexão":"conectando…";
}
function toast(msg,err){ const t=document.getElementById("toast"); t.textContent=msg; t.className="toast show"+(err?" err":""); setTimeout(()=>t.className="toast",2200); }

async function loadAll(){
  const step=1000;
  // 1ª leva: mostra na hora (os de maior prioridade vêm primeiro)
  const {data:first,error}=await sb.from("leads").select("*").order("prioridade",{ascending:false}).order("id",{ascending:true}).range(0,step-1);
  if(error){ setConn("err"); toast("falha ao carregar: "+error.message,true); return; }
  DATA=first;
  document.getElementById("loading").style.display="none";
  document.getElementById("tbl").style.display="";
  buildCatFilter(); render(); setConn("on"); subscribe();

  // demais levas: carrega em background e re-renderiza sem travar
  let from=step;
  while(true){
    const {data,error:e2}=await sb.from("leads").select("*").order("prioridade",{ascending:false}).order("id",{ascending:true}).range(from,from+step-1);
    if(e2||!data||!data.length) break;
    DATA=DATA.concat(data);
    buildCatFilter(); render();
    if(data.length<step) break;
    from+=step;
  }
}

function subscribe(){
  sb.channel("leads-rt").on("postgres_changes",{event:"UPDATE",schema:"public",table:"leads"},payload=>{
    const i=DATA.findIndex(r=>r.id===payload.new.id);
    if(i>=0){ DATA[i]=payload.new; render(); }
  }).subscribe();
}

function buildCatFilter(){
  const cats=[...new Set(DATA.map(r=>r.categoria).filter(c=>c&&c!=="null"))].sort();
  document.getElementById("fCat").innerHTML='<option value="">nicho: todos</option>'+cats.map(c=>`<option>${c}</option>`).join("");
}

function renderRail(){
  const c={total:DATA.length,hot:0,warm:0,cold:0,abordado:0,conversa:0,fechou:0};
  // progresso: quantos de cada temperatura já saíram de "novo"
  const worked={hot:0,warm:0,cold:0};
  DATA.forEach(r=>{ const t=tempOf(r); c[t]++; if(r.status!=="novo")worked[t]++; if(r.status==="abordado")c.abordado++; if(r.status==="conversa")c.conversa++; if(r.status==="fechou")c.fechou++; });
  const pc=n=>DATA.length?Math.round(n*100/DATA.length)+"%":"0%";
  const prog=(t)=>{ const tot=c[t]||1; return Math.round(worked[t]*100/tot); };
  const cards=[
    {k:"hot",cls:"t-hot",ico:"🔥",n:c.hot,l:"quentes",pct:pc(c.hot),kind:"temp",pr:prog("hot"),wk:worked.hot},
    {k:"warm",cls:"t-warm",ico:"🟡",n:c.warm,l:"mornos",pct:pc(c.warm),kind:"temp",pr:prog("warm"),wk:worked.warm},
    {k:"cold",cls:"t-cold",ico:"⚪",n:c.cold,l:"frios",pct:pc(c.cold),kind:"temp",pr:prog("cold"),wk:worked.cold},
    {k:"abordado",cls:"mini",ico:"",n:c.abordado,l:"abordados",pct:"",kind:"status"},
    {k:"conversa",cls:"mini",ico:"",n:c.conversa,l:"em conversa",pct:"",kind:"status"},
    {k:"fechou",cls:"mini t-done",ico:"",n:c.fechou,l:"fechou",pct:"",kind:"status"},
  ];
  document.getElementById("rail").innerHTML=cards.map(x=>{
    const on = x.kind==="temp" ? activeTemp===x.k : activeStatus===x.k;
    const bar = x.kind==="temp" ? `<div class="tprog"><i style="width:${railAnimated?x.pr:0}%"></i></div><div class="tprog-lbl">${x.wk} trabalhados · ${x.pr}%</div>` : "";
    return `<div class="tcard ${x.cls} ${on?'active':''}" data-k="${x.k}" data-kind="${x.kind}">
      <div class="top"><span class="ico">${x.ico}</span><span class="pct">${x.pct}</span></div>
      <div class="n" data-val="${x.n}">${railAnimated?x.n.toLocaleString('pt-BR'):'0'}</div>
      <div class="l">${x.l}</div>
      ${bar}
    </div>`;}).join("");
  if(!railAnimated){ animateRail(); railAnimated=true; }
  document.querySelectorAll(".tcard[data-k]").forEach(el=>{
    el.onclick=()=>{
      const k=el.dataset.k, kind=el.dataset.kind;
      if(kind==="temp"){ activeTemp = activeTemp===k?"":k; }
      else { activeStatus = activeStatus===k?"":k; document.getElementById("fStatus").value=""; }
      page=0; render();
    };
  });
}

let railAnimated=false;
function animateRail(){
  const dur=900, t0=performance.now();
  const els=[...document.querySelectorAll("#rail .n")];
  const bars=[...document.querySelectorAll("#rail .tprog i")];
  function ease(p){ return 1-Math.pow(1-p,3); }
  function step(now){
    const p=Math.min((now-t0)/dur,1), e=ease(p);
    els.forEach(el=>{ const v=+el.dataset.val||0; el.textContent=Math.round(v*e).toLocaleString('pt-BR'); });
    if(p<1) requestAnimationFrame(step);
    else { // enche as barras no fim
      document.querySelectorAll("#rail .tcard").forEach((c,i)=>{ const bar=c.querySelector(".tprog i"); if(bar){ const lbl=c.querySelector(".tprog-lbl"); const m=lbl&&lbl.textContent.match(/(\d+)%/); if(m) bar.style.width=m[1]+"%"; } });
    }
  }
  requestAnimationFrame(step);
}

function computeView(){
  const q=document.getElementById("q").value.trim().toLowerCase();
  const fs=document.getElementById("fStatus").value || activeStatus;
  const fc=document.getElementById("fCat").value;
  const fseg=document.getElementById("fSegue").value;
  const fr=document.getElementById("fResp").value.trim().toLowerCase();
  view=DATA.filter(r=>{
    if(activeTemp && tempOf(r)!==activeTemp) return false;
    if(q && !r.handle.toLowerCase().includes(q)) return false;
    if(fs && r.status!==fs) return false;
    if(fc && r.categoria!==fc) return false;
    if(fseg==="sim" && !r.segue_de_volta) return false;
    if(fseg==="nao" && r.segue_de_volta) return false;
    if(fr && !(r.responsavel||"").toLowerCase().includes(fr)) return false;
    if(onlyReturns){ if(!r.data_retorno) return false; if(r.data_retorno>todayStr()) return false; if(r.status==="fechou"||r.status==="perdido") return false; }
    return true;
  });
  view.sort((a,b)=>{
    let x,y;
    if(sortKey==="temp"){ x=tempRank(a)*100+(a.prioridade||0); y=tempRank(b)*100+(b.prioridade||0); }
    else if(sortKey==="recente"){ x=a.id; y=b.id; }
    else if(sortKey==="status"){ x=Object.keys(STATUS).indexOf(a.status); y=Object.keys(STATUS).indexOf(b.status); }
    else if(sortKey==="segue_de_volta"){ x=a.segue_de_volta?1:0; y=b.segue_de_volta?1:0; }
    else if(sortKey==="ultimo_toque"){ x=a.ultimo_toque||""; y=b.ultimo_toque||""; }
    else { x=(a[sortKey]||"").toString().toLowerCase(); y=(b[sortKey]||"").toString().toLowerCase(); }
    if(x<y)return -sortDir; if(x>y)return sortDir; return 0;
  });
}

function daysSince(ts){ if(!ts)return null; return Math.floor((Date.now()-new Date(ts).getTime())/86400000); }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }

function renderRetBanner(){
  const t=todayStr();
  const due=DATA.filter(r=>r.data_retorno && r.data_retorno<=t && r.status!=="fechou" && r.status!=="perdido");
  const el=document.getElementById("retbanner");
  if(!due.length){ el.style.display="none"; if(onlyReturns){onlyReturns=false;} return; }
  el.style.display="flex";
  el.innerHTML=`<span class="rb-ico">📌</span><span class="rb-txt"><b>${due.length}</b> ${due.length===1?'lead para retornar':'leads para retornar'} hoje ou atrasados</span><span class="rb-go">${onlyReturns?'ver todos ✕':'ver agora →'}</span>`;
  el.onclick=()=>{ onlyReturns=!onlyReturns; activeTemp="";activeStatus=""; page=0; render(); };
}

function render(){
  renderRail();
  renderRetBanner();
  computeView();
  const start=page*PER, slice=view.slice(start,start+PER);
  document.getElementById("rows").innerHTML=slice.map(r=>{
    const t=tempOf(r), d=daysSince(r.ultimo_toque);
    const stale=(r.status==="abordado"||r.status==="conversa")&&d!==null&&d>=5;
    const touch=d===null?"—":d===0?"hoje":d===1?"ontem":d+"d";
    const cat=(r.categoria&&r.categoria!=="null")?`<span class="chip">${r.categoria}</span>`:"—";
    return `<tr data-id="${r.id}" data-st="${r.status}">
      <td><div class="handle"><span class="temp-dot d-${t}"></span><a href="#" onclick="openFicha(${r.id});return false;" style="cursor:pointer">@${r.handle}</a></div></td>
      <td class="cat">${cat}</td>
      <td class="sb">${r.segue_de_volta?'<span title="Pedro segue de volta">↩︎</span>':'<span style="color:var(--muted-2)">·</span>'}</td>
      <td><select class="status-pill st-${r.status}" data-f="status">${Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${k===r.status?'selected':''}>${v}</option>`).join("")}</select></td>
      <td><input class="ed resp" data-f="responsavel" value="${r.responsavel||''}" placeholder="—"></td>
      <td><input class="ed" data-f="proxima_acao" value="${r.proxima_acao||''}" placeholder="—"></td>
      <td class="touch ${stale?'stale':''}">${touch}${stale?' ⚠':''}</td>
    </tr>`;
  }).join("");

  document.querySelectorAll("#rows [data-f]").forEach(el=>{
    el.onchange=async()=>{
      const id=+el.closest("tr").dataset.id, f=el.dataset.f, val=el.value;
      const rec=DATA.find(r=>r.id===id); rec[f]=val; rec.ultimo_toque=new Date().toISOString();
      if(f==="status"){ el.className="status-pill st-"+val; el.closest("tr").setAttribute("data-st",val); }
      const {error}=await sb.from("leads").update({[f]:val,ultimo_toque:rec.ultimo_toque}).eq("id",id);
      if(error){ toast("não salvou: "+error.message,true); } else { toast("salvo ✓"); if(f==="status")renderRail(); }
    };
  });

  const pages=Math.ceil(view.length/PER)||1;
  document.getElementById("foot").innerHTML=`
    <span>${view.length.toLocaleString('pt-BR')} leads ${activeTemp?'· '+activeTemp:''}${activeStatus?'· '+STATUS[activeStatus]:''} · mostrando ${view.length?start+1:0}–${Math.min(start+PER,view.length)}</span>
    <span class="pg"><button class="btn" id="pv" ${page<=0?'disabled':''}>‹</button><span>${page+1}/${pages}</span><button class="btn" id="nx" ${page>=pages-1?'disabled':''}>›</button></span>`;
  const pv=document.getElementById("pv"),nx=document.getElementById("nx");
  if(pv)pv.onclick=()=>{page--;render()}; if(nx)nx.onclick=()=>{page++;render()};
}

function exportCSV(){
  const head=["handle","temp","categoria","segue_de_volta","status","responsavel","proxima_acao","ultimo_toque"];
  const tmap={hot:"quente",warm:"morno",cold:"frio"};
  const lines=[head.join(",")];
  view.forEach(r=>{
    const d=r.ultimo_toque?new Date(r.ultimo_toque).toLocaleDateString('pt-BR'):"";
    lines.push([r.handle,tmap[tempOf(r)],r.categoria||"",r.segue_de_volta?"sim":"não",STATUS[r.status],r.responsavel||"",(r.proxima_acao||"").replace(/,/g,";"),d].map(c=>`"${(c+"").replace(/"/g,'""')}"`).join(","));
  });
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([lines.join("\n")],{type:"text/csv"})); a.download="esteira_export.csv"; a.click();
  toast("csv exportado ✓");
}

document.getElementById("q").oninput=()=>{page=0;render()};
document.getElementById("fStatus").onchange=()=>{activeStatus="";page=0;render()};
document.getElementById("fCat").onchange=()=>{page=0;render()};
document.getElementById("fSegue").onchange=()=>{page=0;render()};
document.getElementById("fResp").oninput=()=>{page=0;render()};
document.getElementById("btnRecent").onclick=()=>{ sortKey="recente"; sortDir=-1; page=0; render(); };
document.getElementById("btnCsv").onclick=exportCSV;
document.querySelectorAll("thead th[data-s]").forEach(th=>th.onclick=()=>{const k=th.dataset.s; if(sortKey===k)sortDir*=-1; else{sortKey=k;sortDir=-1;} render();});

/* ---------- ficha do lead ---------- */
let fichaId=null;
const tmap={hot:"quente",warm:"morno",cold:"frio"};

async function openFicha(id){
  const r=DATA.find(x=>x.id===id); if(!r)return;
  fichaId=id;
  const t=tempOf(r);
  document.getElementById("dDot").className="temp-dot d-"+t;
  const a=document.getElementById("dHandle"); a.textContent="@"+r.handle; a.href=r.url||"https://instagram.com/"+r.handle;
  document.getElementById("dCat").innerHTML="nicho: <b>"+((r.categoria&&r.categoria!=="null")?r.categoria:"—")+"</b>";
  document.getElementById("dSegue").innerHTML="segue: <b>"+(r.segue_de_volta?"Pedro segue ↩︎":"não")+"</b>";
  document.getElementById("dStatus").value=r.status;
  document.getElementById("dResp").value=r.responsavel||"";
  document.getElementById("dNext").value=r.proxima_acao||"";
  document.getElementById("dRet").value=r.data_retorno||"";
  // marca botão de temperatura ativo
  document.querySelectorAll("#dTemp button").forEach(b=>b.classList.toggle("on", b.dataset.t===t));
  document.getElementById("dNotes").innerHTML='<div class="note-empty">carregando…</div>';
  document.getElementById("scrim").classList.add("open");
  document.getElementById("drawer").classList.add("open");
  loadNotes(id);
}
function closeFicha(){ fichaId=null; document.getElementById("scrim").classList.remove("open"); document.getElementById("drawer").classList.remove("open"); }

async function loadNotes(id){
  const {data,error}=await sb.from("lead_notas").select("*").eq("lead_id",id).order("criado_em",{ascending:false});
  const box=document.getElementById("dNotes");
  if(error){ box.innerHTML='<div class="note-empty">erro ao carregar notas</div>'; return; }
  if(!data.length){ box.innerHTML='<div class="note-empty">sem anotações ainda. registre o primeiro contato abaixo.</div>'; return; }
  box.innerHTML=data.map(n=>{
    const dt=new Date(n.criado_em).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    return `<div class="note"><div class="meta"><span>${dt}${n.autor?' · '+n.autor:''}</span><button class="del" onclick="delNote(${n.id})">apagar</button></div><div class="txt">${(n.texto||'').replace(/</g,'&lt;')}</div></div>`;
  }).join("");
}

async function saveFichaField(field,val){
  if(!fichaId)return;
  const rec=DATA.find(r=>r.id===fichaId); rec[field]=val; rec.ultimo_toque=new Date().toISOString();
  const {error}=await sb.from("leads").update({[field]:val,ultimo_toque:rec.ultimo_toque}).eq("id",fichaId);
  if(error)toast("não salvou: "+error.message,true); else { toast("salvo ✓"); render(); }
}

async function setFichaTemp(t){
  if(!fichaId)return;
  const score = t==="hot"?4 : t==="warm"?1 : 0;  // grava prioridade que cai na faixa certa
  const rec=DATA.find(r=>r.id===fichaId); rec.prioridade=score;
  document.querySelectorAll("#dTemp button").forEach(b=>b.classList.toggle("on", b.dataset.t===t));
  document.getElementById("dDot").className="temp-dot d-"+t;
  const {error}=await sb.from("leads").update({prioridade:score}).eq("id",fichaId);
  if(error)toast("não salvou: "+error.message,true); else { toast("temperatura: "+tmap[t]); render(); }
}

async function addNote(){
  if(!fichaId)return;
  const ta=document.getElementById("dNoteText"); const txt=ta.value.trim();
  if(!txt)return;
  const {error}=await sb.from("lead_notas").insert({lead_id:fichaId,texto:txt});
  if(error){ toast("nota não salvou: "+error.message,true); return; }
  ta.value=""; toast("nota adicionada ✓");
  // marca último toque no lead
  saveFichaField("proxima_acao", document.getElementById("dNext").value);
  loadNotes(fichaId);
}
async function delNote(nid){
  const {error}=await sb.from("lead_notas").delete().eq("id",nid);
  if(error){ toast("não apagou",true); return; }
  loadNotes(fichaId);
}

document.getElementById("dClose").onclick=closeFicha;
document.getElementById("scrim").onclick=closeFicha;
document.getElementById("dStatus").onchange=e=>saveFichaField("status",e.target.value);
document.getElementById("dResp").onchange=e=>saveFichaField("responsavel",e.target.value);
document.getElementById("dNext").onchange=e=>saveFichaField("proxima_acao",e.target.value);
document.getElementById("dRet").onchange=e=>saveFichaField("data_retorno",e.target.value);
document.getElementById("dNoteSave").onclick=addNote;
document.querySelectorAll("#dTemp button").forEach(b=>b.onclick=()=>setFichaTemp(b.dataset.t));
document.addEventListener("keydown",e=>{ if(e.key==="Escape")closeFicha(); });

setConn("");
loadAll();
</script>
